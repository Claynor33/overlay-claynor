<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin de stream — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; }
  body.preview{ background:radial-gradient(120% 120% at 50% 40%, #16232b 0%, #0a1014 55%, #05080a 100%); }
  #stage{ position:absolute; top:50%; left:50%; width:1920px; height:1080px; transform-origin:center center; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  .scene-bg{ position:absolute; inset:0;
    background:
      radial-gradient(150% 120% at 50% 45%, transparent 52%, rgba(0,0,0,.6) 100%),
      linear-gradient(180deg, rgba(45,226,230,.03), transparent 38%),
      radial-gradient(130% 120% at 25% -5%, #101d24 0%, #0a1015 48%, #05090c 100%); }
  .scene-bg::before{ content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(120,140,150,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(120,140,150,.05) 1px, transparent 1px); background-size:64px 64px; }

  /* Titre */
  .title{ position:absolute; left:96px; top:96px; }
  .t-name{ font-family:'Chakra Petch'; font-weight:700; font-size:34px; letter-spacing:.42em; color:var(--cyan); text-transform:uppercase; text-shadow:0 0 20px rgba(45,226,230,.35); }
  .t-mid{ display:inline-flex; align-items:center; height:32px; margin:10px 0 6px; }
  .t-mid .lbl{ display:flex; align-items:center; padding:0 20px 0 8px; font-family:'Chakra Petch'; font-weight:700; font-size:20px; letter-spacing:.4em; color:#0a1015; background:var(--ink); clip-path:polygon(0 0,100% 0,calc(100% - 16px) 100%,0 100%); text-transform:uppercase; }
  .t-mid .ln{ width:120px; height:3px; margin-left:-8px; background:var(--ink); box-shadow:0 0 8px rgba(234,246,247,.4); clip-path:polygon(0 0,100% 0,100% 100%,12px 100%); }
  .t-big{ font-family:'Chakra Petch'; font-weight:700; font-size:88px; line-height:.9; letter-spacing:.03em; color:var(--ink); text-transform:uppercase; text-shadow:0 0 34px rgba(45,226,230,.3); }
  .t-sub{ margin-top:14px; font-family:'Rajdhani'; font-weight:600; font-size:20px; letter-spacing:.24em; color:var(--ink-dim); text-transform:uppercase; }

  /* Planning */
  .pl-head{ position:absolute; left:80px; top:452px; display:flex; align-items:center; gap:12px; font-family:'Chakra Petch'; font-weight:600; font-size:13px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase; }
  .pl-head .dot{ width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 9px var(--cyan); animation:blink 1.6s ease-in-out infinite; }
  .pl-head .line{ width:180px; height:1px; background:linear-gradient(90deg,var(--cyan),transparent); }
  .week{ position:absolute; left:80px; right:80px; top:492px; display:flex; gap:10px; }
  .day{ position:relative; flex:1; min-height:452px; background:linear-gradient(160deg, rgba(11,17,21,.92), rgba(9,14,18,.85)); clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); display:flex; flex-direction:column; overflow:hidden; opacity:0; transform:translateY(18px); animation:up .5s cubic-bezier(.2,.7,.2,1) forwards; }
  .day:nth-child(1){animation-delay:.05s}.day:nth-child(2){animation-delay:.11s}.day:nth-child(3){animation-delay:.17s}.day:nth-child(4){animation-delay:.23s}.day:nth-child(5){animation-delay:.29s}.day:nth-child(6){animation-delay:.35s}.day:nth-child(7){animation-delay:.41s}
  .day-h{ height:46px; display:flex; align-items:center; justify-content:center; font-family:'Chakra Petch'; font-weight:700; font-size:16px; letter-spacing:.16em; color:#04252a; background:linear-gradient(90deg,var(--cyan),var(--cyan-deep)); text-transform:uppercase; }
  .day.off .day-h{ background:rgba(45,226,230,.14); color:var(--cyan); }
  .day-body{ flex:1; padding:18px 14px; display:flex; flex-direction:column; gap:14px; }
  .day-time{ font-family:'Chakra Petch'; font-weight:700; font-size:19px; color:var(--ink); text-align:center; letter-spacing:.03em; }
  .day.off .day-time{ color:var(--ink-dim); font-size:16px; letter-spacing:.2em; margin-top:8px; }
  .day-sep{ height:1px; background:linear-gradient(90deg,transparent,var(--line),transparent); }
  .day-eyebrow{ font-family:'Rajdhani'; font-weight:700; font-size:10px; letter-spacing:.2em; color:var(--ink-dim); text-transform:uppercase; text-align:center; }
  .day-game{ display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center; }
  .day-game .ic{ width:28px; height:28px; color:var(--gold); filter:drop-shadow(0 0 7px rgba(245,197,66,.5)); }
  .day-game .gm{ font-family:'Rajdhani'; font-weight:600; font-size:16px; color:var(--ink); line-height:1.25; }
  .day.today{ box-shadow:0 0 30px -6px var(--cyan); }
  .day.today::after{ content:''; position:absolute; inset:0; border:2px solid var(--cyan); clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); pointer-events:none; }

  /* Alerte */
  #toast{ position:absolute; top:110px; left:66%; z-index:60; display:flex; align-items:center; gap:15px; padding:15px 30px; background:linear-gradient(105deg, rgba(14,20,24,.96), rgba(9,13,16,.93)); border:1px solid var(--tc); clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%); box-shadow:0 0 46px -10px var(--tc), inset 0 0 30px -14px var(--tc); opacity:0; pointer-events:none; transform:translateX(-50%) scale(.85); }
  #toast.show{ animation:toastIn .5s cubic-bezier(.2,1.3,.3,1) forwards, toastOut .55s ease 3.1s forwards; }
  #toast::after{ content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.22) 50%,transparent 58%); transform:translateX(-120%); }
  #toast.show::after{ animation:shine 1.1s ease .35s; }
  #toast .tico{ width:38px; height:38px; color:var(--tc); display:inline-flex; filter:drop-shadow(0 0 10px var(--tc)); } #toast .tico svg{ width:100%; height:100%; }
  #toast .th{ font-family:'Chakra Petch'; font-weight:700; font-size:20px; letter-spacing:.14em; color:var(--tc); text-transform:uppercase; text-shadow:0 0 18px var(--tc); }
  #toast .ts{ font-family:'Rajdhani'; font-weight:600; font-size:13px; letter-spacing:.2em; color:#dfe8ea; text-transform:uppercase; }
  #toast .ttxt{ display:flex; flex-direction:column; gap:3px; }

  /* Éditeur (Interagir) */
  #ctrl{ position:absolute; top:20px; left:50%; transform:translateX(-50%) translateY(-12px); z-index:80; width:540px; display:flex; flex-direction:column; gap:7px; padding:14px 16px; background:rgba(6,11,14,.97); border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.6); font-family:'Rajdhani',sans-serif; opacity:0; pointer-events:none; transition:opacity .18s ease; }
  #ctrl.show{ opacity:1; pointer-events:auto; }
  #ctrl .ct{ font-family:'Chakra Petch'; font-weight:700; font-size:11px; letter-spacing:.28em; color:var(--cyan); text-transform:uppercase; text-align:center; margin-bottom:2px; }
  .er{ display:flex; align-items:center; gap:7px; }
  .er .d{ width:36px; font-family:'Chakra Petch'; font-weight:700; font-size:11px; letter-spacing:.05em; color:var(--cyan); text-transform:uppercase; }
  .er input{ height:30px; padding:0 8px; font-family:'Rajdhani'; font-weight:600; font-size:12px; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:5px; }
  .er input.h{ width:130px; } .er input.g{ flex:1; }
  #ctrl .hint{ font-size:10px; letter-spacing:.05em; color:var(--ink-dim); text-align:center; margin-top:4px; }

  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{to{opacity:1;transform:translateX(-50%) scale(1)}}
  @keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.92) translateY(-8px)}}
  @keyframes shine{to{transform:translateX(120%)}}
  @media (prefers-reduced-motion: reduce){ .day,#toast.show::after{ animation:none; } .dot{ animation:none; } }
</style>
</head>
<body class="preview">
  <div id="stage">
    <div class="scene-bg"></div>

    <div class="title">
      <div class="t-name" id="tName">CLAYNOR</div>
      <div class="t-mid"><span class="lbl" id="tMid">FIN DE STREAM</span><span class="ln"></span></div>
      <div class="t-big" id="tBig">MERCI</div>
      <div class="t-sub" id="tSub">À très vite !</div>
    </div>

    <div class="pl-head"><span class="dot"></span>Programme de la semaine<span class="line"></span></div>
    <div class="week" id="week"></div>

    <div id="toast"><span class="tico" id="ti"></span><div class="ttxt"><span class="th" id="tt">—</span><span class="ts" id="tsb">—</span></div></div>

    <div id="ctrl">
      <div class="ct">Planning de la semaine</div>
      <div id="edit"></div>
      <div class="hint">Horaires (ex. 21h00 - 23h00) · laisse vide = Repos · jeu à platiner</div>
    </div>
  </div>

<script>
const CONFIG={
  modePreview:true,                         // false = OBS
  pseudo:"CLAYNOR", ligne:"FIN DE STREAM", grand:"MERCI", sous:"À très vite !",
  accent:"#2de2e6",
  son:true, streamlabs:{token:""}, alertes:{follow:true,sub:true,raid:true,bits:true},
  planning:[
    {jour:"Lundi",    h:"21h00 - 23h00", jeu:"Crisis Core - FF VII"},
    {jour:"Mardi",    h:"",              jeu:""},
    {jour:"Mercredi", h:"21h00 - 00h00", jeu:"Elden Ring"},
    {jour:"Jeudi",    h:"",              jeu:""},
    {jour:"Vendredi", h:"21h00 - 01h00", jeu:"Hadès"},
    {jour:"Samedi",   h:"15h00 - 19h00", jeu:"Bloodborne"},
    {jour:"Dimanche", h:"",              jeu:""}
  ]
};
const K="hudFin_v1";
const TROPHY=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4V3h10v1h4v3a4 4 0 0 1-4 4h-.3A5 5 0 0 1 13 13.9V16h3v2H8v-2h3v-2.1A5 5 0 0 1 7.3 11H7a4 4 0 0 1-4-4V4h4zm0 2H5v1a2 2 0 0 0 2 2V6zm10 0v3a2 2 0 0 0 2-2V6h-2z"/></svg>`;
const LABELS={resub:"Resub",gift:"Sub offert",sub:"Sub",follow:"Follow",don:"Don",raid:"Raid",host:"Host",bits:"Bits"};
const ICON={
  follow:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.3C.6 8.9 2 5.5 5.2 5.5c1.9 0 3.1 1 3.8 2 .7-1 1.9-2 3.8-2 3.2 0 4.6 3.4 3.2 6.2C19.5 16.3 12 21 12 21z"/></svg>`,
  sub:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18l-6 3.4 1.4-6.8L2.3 9.1l6.9-.8L12 2z"/></svg>`,
  gift:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 7h-2.2A2.5 2.5 0 0 0 12 3.2 2.5 2.5 0 0 0 6.2 7H4a1 1 0 0 0-1 1v3h9V7h.9V6H12a1 1 0 1 1 1-1zm-8.5-1H9.9A1.5 1.5 0 1 1 11.5 6zm2.6 5H21V8a1 1 0 0 0-1-1v4zM4 12v8a1 1 0 0 0 1 1h6v-9H4zm9 9h6a1 1 0 0 0 1-1v-8h-7v9z"/></svg>`,
  don:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm.9 15.3v1.2h-1.6v-1.2c-1.4-.2-2.5-1-2.6-2.4h1.6c.1.7.7 1.1 1.8 1.1 1 0 1.6-.4 1.6-1s-.5-.9-1.8-1.2c-1.7-.4-2.9-1-2.9-2.5 0-1.2.9-2 2.3-2.2V5.5h1.6v1.3c1.3.2 2.2 1 2.3 2.2h-1.6c-.1-.6-.6-1-1.5-1s-1.4.4-1.4.9c0 .6.6.8 1.9 1.1 1.8.4 2.8 1.1 2.8 2.6 0 1.2-.9 2.1-2.4 2.4z"/></svg>`,
  raid:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm7 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM3 19v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1H3zm12 0v-1a6.5 6.5 0 0 0-1.2-3.8A4 4 0 0 1 21 18v1h-6z"/></svg>`,
  bits:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12l4 6-10 14L2 8l4-6zm.5 2L4 8h4l2-4H6.5zm7 0l2 4H20l-2.5-4H13.5zM10 4L8 8h8l-2-4h-4zM8.4 10L12 18l3.6-8H8.4z"/></svg>`
};
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=amt<0?0:255,t=Math.abs(amt);r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function setAccent(a){ document.documentElement.style.setProperty('--cyan',a); document.documentElement.style.setProperty('--cyan-deep',shade(a,-0.4)); }

let planning = load() || CONFIG.planning.map(d=>({...d}));
function load(){ try{const r=localStorage.getItem(K);return r?JSON.parse(r):null;}catch(e){return null;} }
function save(){ try{localStorage.setItem(K,JSON.stringify(planning));}catch(e){} }
function todayIdx(){ return (new Date().getDay()+6)%7; }

function renderPlanning(){
  const wk=document.getElementById('week'); wk.innerHTML=''; const ti=todayIdx();
  planning.forEach((d,i)=>{
    const off = !d.h || !d.h.trim();
    const el=document.createElement('div'); el.className='day'+(off?' off':'')+(i===ti?' today':'');
    let body='<div class="day-h">'+esc(d.jour)+'</div><div class="day-body">';
    if(off){ body+='<div class="day-time">Repos</div>'; }
    else{ body+='<div class="day-time">'+esc(d.h)+'</div><div class="day-sep"></div>'
                +'<div class="day-eyebrow">Objectif platine</div>'
                +'<div class="day-game"><span class="ic">'+TROPHY+'</span><span class="gm">'+(d.jeu?esc(d.jeu):'—')+'</span></div>'; }
    body+='</div>';
    el.innerHTML=body; wk.appendChild(el);
  });
}
function buildEditor(){
  const box=document.getElementById('edit'); box.innerHTML='';
  planning.forEach((d,i)=>{
    const row=document.createElement('div'); row.className='er';
    row.innerHTML='<span class="d">'+esc(d.jour.slice(0,3))+'</span>'
      +'<input class="h" data-i="'+i+'" data-k="h" placeholder="21h00 - 23h00">'
      +'<input class="g" data-i="'+i+'" data-k="jeu" placeholder="Jeu à platiner">';
    box.appendChild(row);
  });
  box.querySelectorAll('input').forEach(inp=>{
    const i=+inp.getAttribute('data-i'), k=inp.getAttribute('data-k'); inp.value=planning[i][k]||'';
    inp.addEventListener('input',()=>{ planning[i][k]=inp.value; save(); renderPlanning(); });
  });
}

/* Alertes */
let aq=[],busy=false,actx;
function queue(a){ if(aq.length>6)return; aq.push(a); pump(); }
function pump(){ if(busy||!aq.length)return; busy=true; show(aq.shift()); setTimeout(()=>{busy=false;pump();},4200); }
function show(a){ const t=document.getElementById('toast'); t.style.setProperty('--tc',a.color); document.getElementById('ti').innerHTML=a.icon; document.getElementById('tt').textContent=a.title; document.getElementById('tsb').textContent=a.sub; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); if(CONFIG.son) ding(a.type); }
function ding(type){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended')actx.resume(); const now=actx.currentTime; const notes=type==='follow'?[[660,0],[990,0.1]]:[[880,0],[1320,0.11]]; notes.forEach(([f,dt])=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='triangle'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,now+dt); g.gain.exponentialRampToValueAtTime(0.22,now+dt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dt+0.5); o.connect(g).connect(actx.destination); o.start(now+dt); o.stop(now+dt+0.55); }); }catch(e){} }
function onEvent(type,m){ const name=(m.name||m.from||m.gifter||'ANON'), acc=getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6';
  if(type==='follow'){ if(CONFIG.alertes.follow) queue({type:'follow',title:'Nouveau follow',sub:name,color:acc,icon:ICON.follow}); }
  else if(type==='donation'){ const a=m.formatted_amount||m.amount; queue({type:'don',title:'Don',sub:name+(a?' · '+a:''),color:'#3df08a',icon:ICON.don}); }
  else if(type==='raid'||type==='host'){ if(CONFIG.alertes.raid) queue({type:type,title:(type==='raid'?'Raid !':'Host'),sub:name+' · '+(m.raiders||m.viewers||0)+' viewers',color:'#ff8a3d',icon:ICON.raid}); }
  else if(type==='bits'){ if(CONFIG.alertes.bits) queue({type:'bits',title:'Bits',sub:name+' · '+(parseInt(m.amount,10)||0)+' bits',color:'#a970ff',icon:ICON.bits}); }
  else if(type==='subscription'||type==='resub'){ if(!CONFIG.alertes.sub)return; const st=(m.sub_type||'').toLowerCase();
    if(st==='subgift'||st==='anonsubgift') queue({type:'sub',title:'Sub offert',sub:(m.gifter||name),color:acc,icon:ICON.gift});
    else if(st==='submysterygift') queue({type:'sub',title:'Subs offerts',sub:(m.gifter||name)+' · ×'+(m.amount||1),color:acc,icon:ICON.gift});
    else if(st==='resub'||(m.months&&m.months>1)) queue({type:'sub',title:'Resub',sub:name+' · '+(m.months||1)+' mois',color:acc,icon:ICON.sub});
    else queue({type:'sub',title:'Nouveau sub',sub:name,color:acc,icon:ICON.sub}); } }
function connectStreamlabs(token){ if(!token)return; const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js'; s.onload=()=>{ try{ const sl=io('https://sockets.streamlabs.com?token='+token,{transports:['websocket']}); sl.on('event',ev=>{ if(!ev||!ev.type)return; const ms=Array.isArray(ev.message)?ev.message:[ev.message]; ms.forEach(m=>{ if(m) onEvent(ev.type,m); }); }); }catch(e){} }; s.onerror=()=>{}; document.head.appendChild(s); }
window.testFollow=(n='NEOxWOLF')=>onEvent('follow',{name:n});
window.testRaid=(n='POKIMANE',c=138)=>onEvent('raid',{name:n,raiders:c});

/* Synchronisation couleur (suit le jeu en cours des autres pages) */
(function(){ var SKEY='hud_shared_v1',lv=0; var bc=null; try{bc=new BroadcastChannel('hud-claynor');}catch(e){}
  function rd(){ try{var r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch(e){return null;} }
  function ap(s){ if(s&&s.accent) setAccent(s.accent); }
  var init=rd(); if(init){ lv=init.v||0; ap(init); }
  if(bc) bc.addEventListener('message',function(ev){ if(ev.data&&ev.data.kind==='state') ap(ev.data.s); });
  setInterval(function(){ var s=rd(); if(s&&(s.v||0)>lv){ lv=s.v; ap(s); } },400);
})();

const ctrl=document.getElementById('ctrl'); let hideT;
function wake(){ ctrl.classList.add('show'); clearTimeout(hideT); hideT=setTimeout(()=>ctrl.classList.remove('show'),4000); }
document.addEventListener('mousemove',wake); document.addEventListener('click',wake);
function fit(){ const s=Math.min(window.innerWidth/1920, window.innerHeight/1080); document.getElementById('stage').style.transform=`translate(-50%,-50%) scale(${s})`; }
window.addEventListener('resize',fit);
window.resetPlanning=()=>{ try{localStorage.removeItem(K);}catch(e){} planning=CONFIG.planning.map(d=>({...d})); save(); renderPlanning(); buildEditor(); };

/* init */
document.body.classList.toggle('preview', CONFIG.modePreview);
document.getElementById('tName').textContent=CONFIG.pseudo;
document.getElementById('tMid').textContent=CONFIG.ligne;
document.getElementById('tBig').textContent=CONFIG.grand;
document.getElementById('tSub').textContent=CONFIG.sous;
setAccent(CONFIG.accent);
fit(); renderPlanning(); buildEditor();
connectStreamlabs(CONFIG.streamlabs.token);
if(CONFIG.modePreview){ setTimeout(()=>testFollow(),1800); }
</script>
</body>
</html>
