<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caméra</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  .cam{ position:absolute; left:0; top:0; width:360px; height:203px; overflow:hidden; }
  .cam-edge{ position:absolute; inset:0; border:1px solid var(--line); border-left:none; pointer-events:none; }
  .cam::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--cyan),var(--cyan-deep)); box-shadow:0 0 12px var(--cyan); }
  .cam-label{ position:absolute; left:0; top:0; display:flex; align-items:center; gap:7px; height:24px; padding:0 12px; background:linear-gradient(90deg, rgba(10,15,19,.92), rgba(10,15,19,.35)); font-family:'Chakra Petch'; font-weight:700; font-size:10px; letter-spacing:.28em; color:var(--cyan); text-transform:uppercase; }
  .cam-label .live{ width:6px; height:6px; border-radius:50%; background:#ff4d4d; box-shadow:0 0 8px #ff4d4d; animation:blink 1.4s ease-in-out infinite; }
  .b{ position:absolute; width:22px; height:22px; } .b::before,.b::after{ content:''; position:absolute; background:var(--cyan); box-shadow:0 0 8px var(--cyan); } .b::before{ width:100%; height:2px; } .b::after{ width:2px; height:100%; }
  .tr{ top:0; right:0; } .tr::before{ top:0; right:0; } .tr::after{ top:0; right:0; }
  .br{ bottom:0; right:0; } .br::before{ bottom:0; right:0; } .br::after{ bottom:0; right:0; }
  .bl{ bottom:0; left:0; } .bl::before{ bottom:0; left:0; } .bl::after{ bottom:0; left:0; }

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
@keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.5);filter:drop-shadow(0 0 16px var(--gold));}100%{transform:scale(1);}}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.92) translateY(-8px);}}
@keyframes shine{to{transform:translateX(120%);}}
</style>
</head>
<body>
<div class="cam"><div class="cam-edge"></div><div class="cam-label"><span class="live"></span><span id="lbl">CLAYNOR</span></div><span class="b tr"></span><span class="b br"></span><span class="b bl"></span></div>
<script>

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=amt<0?0:255,t=Math.abs(amt);r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function applyTheme(a){document.documentElement.style.setProperty('--cyan',a);document.documentElement.style.setProperty('--cyan-deep',shade(a,-0.4));}
function accent(){return getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6';}

const SKEY='hud_shared_v1';
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
function readShared(){ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function writeShared(patch){ let s=readShared()||{}; Object.assign(s,patch); s.v=Date.now(); try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} try{ bcHud&&bcHud.postMessage({kind:'state',s}); }catch(e){} return s; }
function subscribeHud(h){ if(bcHud) bcHud.onmessage=function(ev){ var d=ev.data; if(!d) return; if(d.kind==='state'&&h.state) h.state(d.s); if(d.kind==='trophy'&&h.trophy) h.trophy(d); }; if(h.state){ var lv=0; var c=readShared(); if(c) lv=c.v||0; setInterval(function(){ var s=readShared(); if(s&&(s.v||0)>lv){ lv=s.v; h.state(s); } },400); } if(h.trophy){ var lt=0; try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) lt=JSON.parse(r0).ts||0; }catch(e){} setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r){ var p=JSON.parse(r); if(p.ts&&p.ts>lt){ lt=p.ts; h.trophy(p); } } }catch(e){} },300); } }
function tokenUrl(fb){ try{ return new URLSearchParams(location.search).get('token') || fb || ''; }catch(e){ return fb||''; } }

const CONFIG={ label:"CLAYNOR", accent:"#2de2e6" };
document.getElementById('lbl').textContent=CONFIG.label;
var _s=readShared(); applyTheme((_s&&_s.accent)||CONFIG.accent);
subscribeHud({ state:function(s){ if(s.accent) applyTheme(s.accent); } });

</script>
</body>
</html>
