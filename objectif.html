<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objectif</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  .goal{ position:absolute; left:0; top:0; width:280px; padding:12px 16px 13px; background:linear-gradient(105deg, rgba(11,17,21,.95), rgba(9,14,18,.9)); clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%); }
  .goal::before{ content:''; position:absolute; left:0; top:0; height:2px; width:100%; background:linear-gradient(90deg,transparent 30%,var(--cyan)); box-shadow:0 0 10px var(--cyan); }
  .goal-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .goal-label{ font-family:'Chakra Petch'; font-weight:600; font-size:11px; letter-spacing:.26em; color:var(--ink-dim); text-transform:uppercase; }
  .goal-count{ font-family:'Chakra Petch'; font-weight:700; font-size:15px; color:var(--cyan); }
  .goal-bar{ position:relative; height:6px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
  .goal-bar-fill{ position:absolute; left:0; top:0; bottom:0; width:0; background:linear-gradient(90deg,var(--cyan-deep),var(--cyan)); box-shadow:0 0 10px var(--cyan); border-radius:2px; transition:width 1s cubic-bezier(.2,.8,.2,1); }
  .goal.done .goal-count{ color:var(--gold); } .goal.done .goal-bar-fill{ background:linear-gradient(90deg,var(--gold-deep),var(--gold)); box-shadow:0 0 12px rgba(245,197,66,.7); }
  #ctrl{ left:0; top:74px; width:250px; }

  #ctrl{ position:absolute; z-index:80; display:flex; flex-direction:column; gap:8px; padding:12px 14px; background:rgba(6,11,14,.96); border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.6); opacity:0; pointer-events:none; transition:opacity .18s ease; }
  #ctrl.show{ opacity:1; pointer-events:auto; }
  #ctrl .title{ font-family:'Chakra Petch'; font-weight:700; font-size:10px; letter-spacing:.28em; color:var(--cyan); text-transform:uppercase; text-align:center; }
  #ctrl .row{ display:flex; align-items:center; gap:7px; }
  #ctrl .lbl{ width:66px; font-weight:700; font-size:11px; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; }
  #ctrl button{ min-width:30px; height:30px; padding:0 9px; cursor:pointer; font-family:'Chakra Petch'; font-weight:700; font-size:14px; color:var(--ink); background:rgba(45,226,230,.10); border:1px solid var(--line); border-radius:6px; }
  #ctrl button:hover{ background:var(--cyan); color:#04252a; }
  #ctrl button.gold{ background:rgba(245,197,66,.12); border-color:rgba(245,197,66,.4); } #ctrl button.gold:hover{ background:var(--gold); color:#3a2a00; }
  #ctrl button.on{ background:var(--cyan); color:#04252a; }
  #ctrl .val{ min-width:50px; text-align:center; font-family:'Chakra Petch'; font-weight:700; font-size:15px; color:var(--gold); }
  #ctrl .val.acc{ color:var(--cyan); }
  #ctrl input{ flex:1; height:30px; min-width:60px; padding:0 9px; font-family:'Rajdhani'; font-weight:600; font-size:13px; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:6px; text-transform:uppercase; }
  #ctrl input:focus{ outline:none; border-color:var(--cyan); }
  #ctrl .hint{ font-size:9px; letter-spacing:.05em; color:var(--ink-dim); text-align:center; }

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
@keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.5);filter:drop-shadow(0 0 16px var(--gold));}100%{transform:scale(1);}}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.92) translateY(-8px);}}
@keyframes shine{to{transform:translateX(120%);}}
</style>
</head>
<body>
<div class="goal" id="goal">
  <div class="goal-head"><span class="goal-label" id="gl">Objectif</span><span class="goal-count" id="gc">0 / 5</span></div>
  <div class="goal-bar"><div class="goal-bar-fill" id="gb"></div></div>
</div>
<div id="ctrl">
  <div class="title">Objectif</div>
  <div class="row"><span class="lbl">Valeur</span><button data-a="m">-</button><span class="val acc" id="cv">0</span><button data-a="p">+</button><button data-a="t" id="tg">ON</button></div>
  <div class="hint">Se remplit auto via Streamlabs (type: subs/dons/bits)</div>
</div>
<script>

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=amt<0?0:255,t=Math.abs(amt);r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function applyTheme(a){document.documentElement.style.setProperty('--cyan',a);document.documentElement.style.setProperty('--cyan-deep',shade(a,-0.4));}
function accent(){return getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6';}

function connectStreamlabs(token,onEvent){ if(!token) return; const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js'; s.onload=()=>{ try{ const sl=io('https://sockets.streamlabs.com?token='+token,{transports:['websocket']}); sl.on('event',ev=>{ if(!ev||!ev.type) return; const ms=Array.isArray(ev.message)?ev.message:[ev.message]; ms.forEach(m=>{ if(m) onEvent(ev.type,m); }); }); }catch(e){ console.warn(e); } }; s.onerror=()=>console.warn('socket.io non chargé'); document.head.appendChild(s); }

const SKEY='hud_shared_v1';
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
function readShared(){ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function writeShared(patch){ let s=readShared()||{}; Object.assign(s,patch); s.v=Date.now(); try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} try{ bcHud&&bcHud.postMessage({kind:'state',s}); }catch(e){} return s; }
function subscribeHud(h){ if(bcHud) bcHud.onmessage=function(ev){ var d=ev.data; if(!d) return; if(d.kind==='state'&&h.state) h.state(d.s); if(d.kind==='trophy'&&h.trophy) h.trophy(d); }; if(h.state){ var lv=0; var c=readShared(); if(c) lv=c.v||0; setInterval(function(){ var s=readShared(); if(s&&(s.v||0)>lv){ lv=s.v; h.state(s); } },400); } if(h.trophy){ var lt=0; try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) lt=JSON.parse(r0).ts||0; }catch(e){} setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r){ var p=JSON.parse(r); if(p.ts&&p.ts>lt){ lt=p.ts; h.trophy(p); } } }catch(e){} },300); } }
function tokenUrl(fb){ try{ return new URLSearchParams(location.search).get('token') || fb || ''; }catch(e){ return fb||''; } }

const CONFIG={ demo:false, accent:"#2de2e6", label:"Objectif subs", cible:5, type:"subs", streamlabs:{token:""} };
const K="wObj_v1";
let obj=load()||{actuel:0,actif:true};
function load(){ try{const r=localStorage.getItem(K);return r?JSON.parse(r):null;}catch(e){return null;} }
function save(){ try{localStorage.setItem(K,JSON.stringify(obj));}catch(e){} }
function shTro(){ var s=readShared(); return (s&&s.trophees)?s.trophees:null; }
function render(){ const g=document.getElementById('goal'); const b=document.getElementById('tg'); if(b){b.textContent=obj.actif?'ON':'OFF';b.classList.toggle('on',obj.actif);} if(!obj.actif){g.style.display='none';return;} g.style.display='';
  var actuel=obj.actuel, cible=CONFIG.cible;
  if(CONFIG.type==='trophees'){ var tr=shTro(); if(tr){ actuel=tr.obtenus; cible=CONFIG.cible||tr.total; } }
  document.getElementById('gl').textContent=CONFIG.label; document.getElementById('gc').textContent=actuel+' / '+cible; document.getElementById('cv').textContent=actuel;
  const pct=cible?Math.min(100,Math.round(actuel/cible*100)):0; requestAnimationFrame(()=>document.getElementById('gb').style.width=pct+'%'); g.classList.toggle('done',cible>0&&actuel>=cible); }
function onEvent(type,m){
  if(CONFIG.type==='subs' && (type==='subscription'||type==='resub')){ const st=(m.sub_type||'').toLowerCase(); obj.actuel += (st==='submysterygift'?(m.amount||1):1); save(); render(); }
  else if(CONFIG.type==='dons' && type==='donation'){ obj.actuel += Number(m.amount)||0; save(); render(); }
  else if(CONFIG.type==='bits' && type==='bits'){ obj.actuel += parseInt(m.amount,10)||0; save(); render(); }
}
document.getElementById('ctrl').addEventListener('click',e=>{ const a=e.target.getAttribute('data-a'); if(!a) return;
  if(a==='p'){obj.actuel++;save();render();} if(a==='m'){obj.actuel=Math.max(0,obj.actuel-1);save();render();} if(a==='t'){obj.actif=!obj.actif;save();render();} });

const ctrl=document.getElementById('ctrl'); let hideT;
function wake(){ if(!ctrl) return; ctrl.classList.add('show'); clearTimeout(hideT); hideT=setTimeout(()=>ctrl.classList.remove('show'),3500); }
document.addEventListener('mousemove', wake); document.addEventListener('click', wake);

var _s=readShared(); applyTheme((_s&&_s.accent)||CONFIG.accent);
subscribeHud({ state:function(s){ if(s.accent) applyTheme(s.accent); if(CONFIG.type==='trophees') render(); } });
connectStreamlabs(tokenUrl(CONFIG.streamlabs.token), onEvent);
if(CONFIG.demo && CONFIG.type!=='trophees') obj.actuel=Math.max(obj.actuel,3);
render();

</script>
</body>
</html>
