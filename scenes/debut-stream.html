<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Début de stream — Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; }
  body.preview{ background:radial-gradient(120% 120% at 50% 50%, #16232b 0%, #0a1014 55%, #05080a 100%); }
  #stage{ position:absolute; top:50%; left:50%; width:1920px; height:1080px; transform-origin:center center; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  /* ============ FOND DE SCÈNE (trou transparent sur le cadre) ============ */
  .scene-bg{ position:absolute; inset:0;
    background:
      radial-gradient(150% 120% at 50% 45%, transparent 50%, rgba(0,0,0,.6) 100%),
      linear-gradient(180deg, rgba(45,226,230,.03), transparent 38%),
      radial-gradient(130% 120% at 25% -5%, #101d24 0%, #0a1015 48%, #05090c 100%);
    clip-path: polygon(
      0 0, 1920px 0, 1920px 1080px, 0 1080px,
      0 70px, 1180px 70px, 1180px 1010px, 1860px 1010px, 1860px 70px, 1180px 70px, 0 70px,
      0 0
    );
  }
  .scene-bg::before{ content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(120,140,150,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(120,140,150,.05) 1px, transparent 1px); background-size:64px 64px; }
  .scene-bg::after{ content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(0deg, rgba(0,0,0,.10) 0 2px, transparent 2px 4px); opacity:.5; }

  /* ============ TITRE ============ */
  .start-title{ position:absolute; left:96px; top:150px; }
  .st-name{ font-family:'Chakra Petch'; font-weight:700; font-size:36px; letter-spacing:.42em; color:var(--cyan); text-transform:uppercase; text-shadow:0 0 20px rgba(45,226,230,.35); }
  .st-mid{ display:inline-flex; align-items:center; height:34px; margin:10px 0 6px; }
  .st-mid .lbl{ display:flex; align-items:center; padding:0 22px 0 8px; font-family:'Chakra Petch'; font-weight:700; font-size:22px; letter-spacing:.52em; color:#0a1015; background:var(--ink); clip-path:polygon(0 0,100% 0,calc(100% - 18px) 100%,0 100%); text-transform:uppercase; }
  .st-mid .ln{ width:130px; height:3px; margin-left:-8px; background:var(--ink); box-shadow:0 0 8px rgba(234,246,247,.4); clip-path:polygon(0 0,100% 0,100% 100%,12px 100%); }
  .st-big{ font-family:'Chakra Petch'; font-weight:700; font-size:92px; line-height:.9; letter-spacing:.02em; color:var(--ink); text-transform:uppercase; text-shadow:0 0 34px rgba(45,226,230,.3); }

  /* ============ COMPTE À REBOURS ============ */
  .countdown{ position:absolute; left:100px; top:500px; }
  .cd-box{ position:relative; display:inline-block; padding:14px 30px 12px; background:linear-gradient(105deg, rgba(11,17,21,.95), rgba(9,14,18,.9)); clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px)); }
  .cd-box::before{ content:''; position:absolute; left:0; top:0; height:2px; width:100%; background:linear-gradient(90deg,var(--cyan),transparent 75%); box-shadow:0 0 10px var(--cyan); }
  .cd-time{ font-family:'Chakra Petch'; font-weight:700; font-size:66px; line-height:1; letter-spacing:.04em; color:var(--ink); font-variant-numeric:tabular-nums; text-shadow:0 0 24px rgba(45,226,230,.3); }
  .cd-bar{ position:relative; height:7px; margin-top:12px; background:rgba(255,255,255,.05); overflow:hidden; }
  .cd-bar-fill{ position:absolute; left:0; top:0; bottom:0; width:100%; background:linear-gradient(90deg,var(--cyan-deep),var(--cyan)); box-shadow:0 0 10px var(--cyan); transition:width .5s linear; }
  .cd-bar-fill::after{ content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(90deg, transparent 0 7px, rgba(9,14,18,.85) 7px 9px); }
  .cd-corner{ position:absolute; width:15px; height:15px; z-index:3; }
  .cd-corner::before,.cd-corner::after{ content:''; position:absolute; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .cd-corner::before{ width:100%; height:2px; } .cd-corner::after{ width:2px; height:100%; }
  .cc-tl{ top:-1px; left:-1px; } .cc-tl::before{ top:0; left:0; } .cc-tl::after{ top:0; left:0; }
  .cc-br{ bottom:-1px; right:-1px; } .cc-br::before{ bottom:0; right:0; } .cc-br::after{ bottom:0; right:0; }
  .cd-state{ margin:14px 0 0 4px; font-family:'Chakra Petch'; font-weight:600; font-size:14px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase; }
  .cd-state .live{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--cyan); box-shadow:0 0 9px var(--cyan); margin-right:9px; vertical-align:middle; animation:blink 1.5s ease-in-out infinite; }
  .cd-box.done{ animation:cdPulse 1.4s ease-in-out infinite; }
  .cd-box.done .cd-time{ color:var(--gold); text-shadow:0 0 26px rgba(245,197,66,.5); }
  .cd-box.done::before{ background:linear-gradient(90deg,var(--gold),transparent 75%); box-shadow:0 0 12px var(--gold); }
  .cd-box.done .cd-bar-fill{ background:linear-gradient(90deg,var(--gold-deep),var(--gold)); box-shadow:0 0 12px var(--gold); }

  /* ============ CADRE CAM / MÉDIA (droite) ============ */
  .frame{ position:absolute; left:1180px; top:70px; width:680px; height:940px; overflow:hidden; background:linear-gradient(135deg, rgba(12,20,25,.5), rgba(6,11,14,.2)); }
  body:not(.preview) .frame{ background:transparent; }
  .frame-edge{ position:absolute; inset:0; border:1px solid var(--line); pointer-events:none; }
  .frame::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--cyan),var(--cyan-deep)); box-shadow:0 0 12px var(--cyan); z-index:4; }
  .frame-label{ position:absolute; left:0; top:0; display:flex; align-items:center; gap:8px; height:28px; padding:0 14px; background:linear-gradient(90deg, rgba(10,15,19,.92), rgba(10,15,19,.35)); font-family:'Chakra Petch'; font-weight:700; font-size:11px; letter-spacing:.3em; color:var(--cyan); text-transform:uppercase; z-index:3; }
  .frame-label .live{ width:7px; height:7px; border-radius:50%; background:#ff4d4d; box-shadow:0 0 8px #ff4d4d; animation:blink 1.4s ease-in-out infinite; }
  .frame-hint{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Chakra Petch'; letter-spacing:.4em; font-size:18px; color:rgba(111,133,140,.4); text-transform:uppercase; }
  body:not(.preview) .frame-hint{ display:none; }
  .fr-bracket{ position:absolute; width:28px; height:28px; z-index:3; }
  .fr-bracket::before,.fr-bracket::after{ content:''; position:absolute; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .fr-bracket::before{ width:100%; height:2px; } .fr-bracket::after{ width:2px; height:100%; }
  .fb-tl{ top:0; left:0; } .fb-tl::before{ top:0; left:0; } .fb-tl::after{ top:0; left:0; }
  .fb-tr{ top:0; right:0; } .fb-tr::before{ top:0; right:0; } .fb-tr::after{ top:0; right:0; }
  .fb-br{ bottom:0; right:0; } .fb-br::before{ bottom:0; right:0; } .fb-br::after{ bottom:0; right:0; }
  .fb-bl{ bottom:0; left:0; } .fb-bl::before{ bottom:0; left:0; } .fb-bl::after{ bottom:0; left:0; }

  /* ============ ALERTE (follow/sub/raid/bits) ============ */
  #toast{ position:absolute; top:110px; left:34%; z-index:60; display:flex; align-items:center; gap:15px; padding:15px 30px; background:linear-gradient(105deg, rgba(14,20,24,.96), rgba(9,13,16,.93)); border:1px solid var(--tc); clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%); box-shadow:0 0 46px -10px var(--tc), inset 0 0 30px -14px var(--tc); opacity:0; pointer-events:none; transform:translateX(-50%) scale(.85); }
  #toast.show{ animation:toastIn .5s cubic-bezier(.2,1.3,.3,1) forwards, toastOut .55s ease 3.1s forwards; }
  #toast::after{ content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.22) 50%,transparent 58%); transform:translateX(-120%); }
  #toast.show::after{ animation:shine 1.1s ease .35s; }
  #toast .tico{ width:38px; height:38px; color:var(--tc); display:inline-flex; filter:drop-shadow(0 0 10px var(--tc)); } #toast .tico svg{ width:100%; height:100%; }
  #toast .ttxt{ display:flex; flex-direction:column; gap:3px; }
  #toast .th{ font-family:'Chakra Petch'; font-weight:700; font-size:20px; letter-spacing:.14em; color:var(--tc); text-transform:uppercase; text-shadow:0 0 18px var(--tc); }
  #toast .ts{ font-family:'Rajdhani'; font-weight:600; font-size:13px; letter-spacing:.2em; color:#dfe8ea; text-transform:uppercase; }

  /* ============ CONTRÔLE (Interagir) ============ */
  #ctrl{ position:absolute; top:22px; left:50%; transform:translateX(-50%) translateY(-12px); z-index:80; display:flex; flex-direction:column; gap:9px; padding:14px 16px; background:rgba(6,11,14,.96); border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.6); font-family:'Rajdhani',sans-serif; opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease; }
  #ctrl.show{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  #ctrl .title{ font-family:'Chakra Petch'; font-weight:700; font-size:11px; letter-spacing:.3em; color:var(--cyan); text-transform:uppercase; text-align:center; }
  #ctrl .row{ display:flex; align-items:center; gap:8px; }
  #ctrl .lbl{ width:74px; font-weight:700; font-size:12px; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; }
  #ctrl button{ min-width:38px; height:32px; padding:0 12px; cursor:pointer; font-family:'Chakra Petch'; font-weight:700; font-size:14px; color:var(--ink); background:rgba(45,226,230,.10); border:1px solid var(--line); border-radius:6px; transition:.12s; }
  #ctrl button:hover{ background:var(--cyan); color:#04252a; }
  #ctrl .val{ min-width:74px; text-align:center; font-family:'Chakra Petch'; font-weight:700; font-size:18px; color:var(--cyan); font-variant-numeric:tabular-nums; }
  #ctrl .hint{ font-size:10px; letter-spacing:.06em; color:var(--ink-dim); text-align:center; margin-top:2px; }

  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }
  @keyframes hudIn{ to{ opacity:1; transform:translateY(0);} }
  @keyframes toastIn{ to{ opacity:1; transform:translateX(-50%) scale(1);} }
  @keyframes toastOut{ to{ opacity:0; transform:translateX(-50%) scale(.92) translateY(-8px);} }
  @keyframes shine{ to{ transform:translateX(120%);} }
  @keyframes cdPulse{ 0%,100%{ filter:drop-shadow(0 0 0 rgba(245,197,66,0)); } 50%{ filter:drop-shadow(0 0 18px rgba(245,197,66,.45)); } }
  @media (prefers-reduced-motion: reduce){ #toast.show::after,.cd-box.done{ animation:none; } .live{ animation:none; } }
</style>
</head>
<body class="preview">
  <div id="stage">

    <div class="scene-bg"></div>

    <div class="start-title">
      <div class="st-name" id="stName">CLAYNOR</div>
      <div class="st-mid"><span class="lbl" id="stMid">STREAM</span><span class="ln"></span></div>
      <div class="st-big" id="stBig">STARTING</div>
    </div>

    <div class="countdown">
      <div class="cd-box" id="cdBox">
        <span class="cd-corner cc-tl"></span><span class="cd-corner cc-br"></span>
        <div class="cd-time" id="cd">05:00</div>
        <div class="cd-bar"><div class="cd-bar-fill" id="cdBar"></div></div>
      </div>
      <div class="cd-state" id="cdState"><span class="live"></span>Direct imminent</div>
    </div>

    <div class="frame">
      <div class="frame-edge"></div>
      <div class="frame-label"><span class="live"></span><span id="frLabel">CLAYNOR</span></div>
      <div class="frame-hint">Caméra / Média</div>
      <span class="fr-bracket fb-tl"></span><span class="fr-bracket fb-tr"></span><span class="fr-bracket fb-br"></span><span class="fr-bracket fb-bl"></span>
    </div>

    <div id="toast"><span class="tico" id="toastIcon"></span><div class="ttxt"><span class="th" id="toastTitle">—</span><span class="ts" id="toastSub">—</span></div></div>

    <div id="ctrl">
      <div class="title">Minuteur</div>
      <div class="row"><span class="lbl">Minutes</span><button data-act="m1">−1</button><span class="val" id="cCd">05:00</span><button data-act="p1">+1</button></div>
      <div class="row"><span class="lbl">Ajuster</span><button data-act="m10">−10s</button><button data-act="p10">+10s</button><button data-act="reset">Reset</button></div>
      <div class="hint">Le minuteur reprend où il en était après un refresh d'OBS</div>
    </div>

  </div>

<script>
/* =========================================================================
   CONFIG
   ========================================================================= */
const CONFIG = {
  modePreview: false,                 // false = OBS (fond opaque, trou transparent sur le cadre)
  pseudo: "CLAYNOR",                 // ligne du haut + libellé du cadre
  titre1: "STREAM",                  // bandeau du milieu
  titre2: "STARTING",                // grand titre
  depart: { minutes: 5 },            // durée du compte à rebours
  finText: "ON Y VA !",              // texte quand le minuteur atteint 0
  accent: "#2de2e6",                 // couleur d'accent
  streamlabs: { token:"" },          // Socket API Token (alertes pendant l'attente)
  son: true,
  alertes: { follow:true, sub:true, raid:true, bits:true }
};
const KEY = "hudStart_v1";
const LABELS = { resub:"Resub", gift:"Sub offert", sub:"Sub", follow:"Follow", don:"Don", raid:"Raid", host:"Host", bits:"Bits" };
const ICON = {
  follow:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.3C.6 8.9 2 5.5 5.2 5.5c1.9 0 3.1 1 3.8 2 .7-1 1.9-2 3.8-2 3.2 0 4.6 3.4 3.2 6.2C19.5 16.3 12 21 12 21z"/></svg>`,
  sub:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18l-6 3.4 1.4-6.8L2.3 9.1l6.9-.8L12 2z"/></svg>`,
  gift:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 7h-2.2A2.5 2.5 0 0 0 12 3.2 2.5 2.5 0 0 0 6.2 7H4a1 1 0 0 0-1 1v3h9V7h.9V6H12a1 1 0 1 1 1-1zm-8.5-1H9.9A1.5 1.5 0 1 1 11.5 6zm2.6 5H21V8a1 1 0 0 0-1-1v4zM4 12v8a1 1 0 0 0 1 1h6v-9H4zm9 9h6a1 1 0 0 0 1-1v-8h-7v9z"/></svg>`,
  don:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm.9 15.3v1.2h-1.6v-1.2c-1.4-.2-2.5-1-2.6-2.4h1.6c.1.7.7 1.1 1.8 1.1 1 0 1.6-.4 1.6-1s-.5-.9-1.8-1.2c-1.7-.4-2.9-1-2.9-2.5 0-1.2.9-2 2.3-2.2V5.5h1.6v1.3c1.3.2 2.2 1 2.3 2.2h-1.6c-.1-.6-.6-1-1.5-1s-1.4.4-1.4.9c0 .6.6.8 1.9 1.1 1.8.4 2.8 1.1 2.8 2.6 0 1.2-.9 2.1-2.4 2.4z"/></svg>`,
  raid:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm7 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM3 19v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1H3zm12 0v-1a6.5 6.5 0 0 0-1.2-3.8A4 4 0 0 1 21 18v1h-6z"/></svg>`,
  bits:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12l4 6-10 14L2 8l4-6zm.5 2L4 8h4l2-4H6.5zm7 0l2 4H20l-2.5-4H13.5zM10 4L8 8h8l-2-4h-4zM8.4 10L12 18l3.6-8H8.4z"/></svg>`
};

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shade(hex, amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; const f=amt<0?0:255,t=Math.abs(amt); r=Math.round((f-r)*t+r); g=Math.round((f-g)*t+g); b=Math.round((f-b)*t+b); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function applyTheme(){ if(CONFIG.accent){ document.documentElement.style.setProperty('--cyan', CONFIG.accent); document.documentElement.style.setProperty('--cyan-deep', shade(CONFIG.accent,-0.4)); } }
function accent(){ return getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6'; }
function gold(){ return getComputedStyle(document.documentElement).getPropertyValue('--gold').trim()||'#f5c542'; }

/* =========================================================================
   ALERTES ANIMÉES
   ========================================================================= */
let aq=[], aBusy=false;
function queueAlert(a){ if(aq.length>6) return; aq.push(a); pumpAlerts(); }
function pumpAlerts(){ if(aBusy||!aq.length) return; aBusy=true; showAlert(aq.shift()); setTimeout(()=>{ aBusy=false; pumpAlerts(); }, 4200); }
function showAlert(a){ const t=document.getElementById('toast'); t.style.setProperty('--tc', a.color); document.getElementById('toastIcon').innerHTML=a.icon; document.getElementById('toastTitle').textContent=a.title; document.getElementById('toastSub').textContent=a.sub; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); if(CONFIG.son) ding(a.type); }
let actx;
function ding(type){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); const now=actx.currentTime; const notes=type==='follow'?[[660,0],[990,0.1]]:[[880,0],[1320,0.11]]; notes.forEach(([f,dt])=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='triangle'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,now+dt); g.gain.exponentialRampToValueAtTime(0.22,now+dt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dt+0.5); o.connect(g).connect(actx.destination); o.start(now+dt); o.stop(now+dt+0.55); }); }catch(e){} }

/* =========================================================================
   STREAMLABS
   ========================================================================= */
function connectStreamlabs(token){ if(!token) return; const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js'; s.onload=()=>initSocket(token); s.onerror=()=>console.warn('[HUD] socket.io non chargé'); document.head.appendChild(s); }
function initSocket(token){ try{ const sl=io('https://sockets.streamlabs.com?token='+token,{transports:['websocket']}); sl.on('connect',()=>console.log('[HUD] Streamlabs connecté')); sl.on('event',ev=>{ if(!ev||!ev.type) return; const msgs=Array.isArray(ev.message)?ev.message:[ev.message]; msgs.forEach(m=>{ if(m) handleEvent(ev.type,m); }); }); }catch(e){ console.warn('[HUD] Streamlabs',e); } }
function handleEvent(type,m){
  const name=(m.name||m.from||m.gifter||'ANON');
  if(type==='follow'){ if(CONFIG.alertes.follow) queueAlert({type:'follow',title:'Nouveau follow',sub:name,color:accent(),icon:ICON.follow}); }
  else if(type==='donation'){ const amt=m.formatted_amount||m.amount; queueAlert({type:'don',title:'Don',sub:name+(amt?' · '+amt:''),color:'#3df08a',icon:ICON.don}); }
  else if(type==='raid'||type==='host'){ const c=m.raiders||m.viewers||m.count||0; if(CONFIG.alertes.raid) queueAlert({type:type,title:(type==='raid'?'Raid !':'Host'),sub:name+' · '+c+' viewers',color:'#ff8a3d',icon:ICON.raid}); }
  else if(type==='bits'){ const a=parseInt(m.amount,10)||0; if(CONFIG.alertes.bits) queueAlert({type:'bits',title:'Bits',sub:name+' · '+a+' bits',color:'#a970ff',icon:ICON.bits}); }
  else if(type==='subscription'||type==='resub'){
    if(!CONFIG.alertes.sub) return;
    const st=(m.sub_type||'').toLowerCase();
    if(st==='subgift'||st==='anonsubgift') queueAlert({type:'sub',title:'Sub offert',sub:(m.gifter||name),color:accent(),icon:ICON.gift});
    else if(st==='submysterygift') queueAlert({type:'sub',title:'Subs offerts',sub:(m.gifter||name)+' · ×'+(m.amount||1),color:accent(),icon:ICON.gift});
    else if(st==='resub'||(m.months&&m.months>1)) queueAlert({type:'sub',title:'Resub',sub:name+' · '+(m.months||1)+' mois',color:accent(),icon:ICON.sub});
    else queueAlert({type:'sub',title:'Nouveau sub',sub:name,color:accent(),icon:ICON.sub});
  }
}

/* =========================================================================
   COMPTE À REBOURS
   ========================================================================= */
let endTime, startTotal;
function loadTimer(){
  try{
    const e=parseInt(localStorage.getItem(KEY+'_end')||'0',10);
    const s=parseInt(localStorage.getItem(KEY+'_tot')||'0',10);
    if(e && e>Date.now()){ endTime=e; startTotal=s||(CONFIG.depart.minutes*60000); return; }
  }catch(err){}
  endTime=Date.now()+CONFIG.depart.minutes*60000; startTotal=CONFIG.depart.minutes*60000;
}
function saveTimer(){ try{ localStorage.setItem(KEY+'_end',String(endTime)); localStorage.setItem(KEY+'_tot',String(startTotal)); }catch(e){} }
function fmt(ms){ const s=Math.max(0,Math.round(ms/1000)); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
function tick(){
  const rem=Math.max(0, endTime-Date.now()), done=rem<=0;
  document.getElementById('cd').textContent=fmt(rem);
  document.getElementById('cCd').textContent=fmt(rem);
  document.getElementById('cdBox').classList.toggle('done', done);
  document.getElementById('cdState').innerHTML = done ? '<span class="live"></span>'+esc(CONFIG.finText) : '<span class="live"></span>Direct imminent';
  const frac = startTotal>0 ? Math.max(0,Math.min(1, rem/startTotal)) : 0;
  document.getElementById('cdBar').style.width=(frac*100)+'%';
}
function addSec(n){ endTime=Math.max(Date.now(), endTime+n*1000); const r=endTime-Date.now(); if(r>startTotal) startTotal=r; saveTimer(); tick(); }
function resetTimer(){ endTime=Date.now()+CONFIG.depart.minutes*60000; startTotal=CONFIG.depart.minutes*60000; saveTimer(); tick(); }

/* =========================================================================
   CONTRÔLE + DÉMARRAGE
   ========================================================================= */
document.getElementById('ctrl').addEventListener('click', e=>{ const a=e.target.getAttribute('data-act'); if(!a) return;
  if(a==='m1') addSec(-60); if(a==='p1') addSec(60); if(a==='m10') addSec(-10); if(a==='p10') addSec(10); if(a==='reset') resetTimer(); });
const ctrl=document.getElementById('ctrl'); let hideT;
function wake(){ ctrl.classList.add('show'); clearTimeout(hideT); hideT=setTimeout(()=>ctrl.classList.remove('show'),3500); }
document.addEventListener('mousemove', wake); document.addEventListener('click', wake);

function fit(){ const s=Math.min(window.innerWidth/1920, window.innerHeight/1080); document.getElementById('stage').style.transform=`translate(-50%,-50%) scale(${s})`; }
window.addEventListener('resize', fit);

/* API de test */
window.testFollow=(n='NEOxWOLF')=> handleEvent('follow',{name:n});
window.testSub=(n='KALYA_TV')=> handleEvent('subscription',{name:n,sub_type:'sub'});
window.testRaid=(n='POKIMANE',c=138)=> handleEvent('raid',{name:n,raiders:c});
window.testBits=(n='XQCOW',a=500)=> handleEvent('bits',{name:n,amount:String(a)});
window.setMinutes=(m)=>{ CONFIG.depart.minutes=m; resetTimer(); };
window.resetTimer=resetTimer;

/* init */
document.body.classList.toggle('preview', CONFIG.modePreview);
document.getElementById('stName').textContent=CONFIG.pseudo;
document.getElementById('stMid').textContent=CONFIG.titre1;
document.getElementById('stBig').textContent=CONFIG.titre2;
document.getElementById('frLabel').textContent=CONFIG.pseudo;
applyTheme(); fit(); loadTimer(); tick(); setInterval(tick, 250);
connectStreamlabs((new URLSearchParams(location.search).get('token'))||CONFIG.streamlabs.token);

/* démo (aperçu) : une alerte follow puis un raid */
if(CONFIG.modePreview){ setTimeout(()=> testFollow(), 1800); setTimeout(()=> testRaid(), 6400); }

/* ===== synchronisation couleur (état partagé) ===== */
(function(){
  var SKEY='hud_shared_v1', lv=0; var bc=null; try{bc=new BroadcastChannel('hud-claynor');}catch(e){}
  function rd(){ try{var r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch(e){return null;} }
  function ap(s){ if(s&&s.accent){ document.documentElement.style.setProperty('--cyan',s.accent); document.documentElement.style.setProperty('--cyan-deep',shade(s.accent,-0.4)); } }
  var init=rd(); if(init){ lv=init.v||0; ap(init); }
  if(bc) bc.addEventListener('message',function(ev){ if(ev.data&&ev.data.kind==='state') ap(ev.data.s); });
  setInterval(function(){ var s=rd(); if(s&&(s.v||0)>lv){ lv=s.v; ap(s); } },400);
})();
</script>
