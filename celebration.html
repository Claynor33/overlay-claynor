<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Célébration trophée</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#f5c542; --gold-deep:#c8951f; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; }
  #note{ position:absolute; left:12px; top:12px; }
  .card{ --dx:-26px; position:relative; display:inline-flex; align-items:center; gap:13px; padding:11px 20px 11px 15px;
    background:linear-gradient(105deg, rgba(18,13,4,.96), rgba(11,8,3,.93));
    border:1px solid rgba(245,197,66,.55);
    clip-path:polygon(0 0, calc(100% - 13px) 0, 100% 13px, 100% 100%, 13px 100%, 0 calc(100% - 13px));
    box-shadow:0 0 30px -12px var(--gold);
    opacity:0; transform:translateX(var(--dx)); }
  .card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--gold),var(--gold-deep)); box-shadow:0 0 12px var(--gold); }
  .card::after{ content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 42%,rgba(255,240,200,.25) 50%,transparent 58%); transform:translateX(-120%); }
  #note.show .card{ animation:cardIn .45s cubic-bezier(.2,1.25,.3,1) forwards, cardOut .5s ease 3.4s forwards; }
  #note.show .card::after{ animation:shine 1s ease .3s; }
  .ico{ width:30px; height:30px; color:var(--gold); display:inline-flex; filter:drop-shadow(0 0 8px rgba(245,197,66,.6)); } .ico svg{ width:100%; height:100%; }
  .plus{ font-family:'Chakra Petch'; font-weight:700; font-size:30px; line-height:1; color:var(--gold); text-shadow:0 0 16px rgba(245,197,66,.5); }
  #note.show .plus{ animation:plusPop .55s cubic-bezier(.2,1.5,.3,1) .1s both; }
  .sep{ width:1px; height:34px; background:linear-gradient(transparent,rgba(245,197,66,.4),transparent); }
  .txt{ display:flex; flex-direction:column; gap:3px; }
  .th{ font-family:'Chakra Petch'; font-weight:700; font-size:13px; letter-spacing:.16em; color:var(--gold); text-transform:uppercase; text-shadow:0 0 12px rgba(245,197,66,.3); white-space:nowrap; }
  .ts{ font-family:'Rajdhani'; font-weight:600; font-size:13px; letter-spacing:.14em; color:#d8cba0; text-transform:uppercase; white-space:nowrap; }
  .ts b{ color:var(--gold); }
  @keyframes cardIn{ to{ opacity:1; transform:translateX(0); } }
  @keyframes cardOut{ to{ opacity:0; transform:translateX(var(--dx)); } }
  @keyframes plusPop{ 0%{ transform:scale(.3); opacity:0; } 60%{ transform:scale(1.25); opacity:1; } 100%{ transform:scale(1); } }
  @keyframes shine{ to{ transform:translateX(120%); } }
  @media (prefers-reduced-motion: reduce){ #note.show .card{ animation:cardIn .01ms forwards, cardOut .5s ease 3.4s forwards; } #note.show .plus,#note.show .card::after{ animation:none; } }
</style>
</head>
<body>
  <div id="note">
    <div class="card">
      <span class="ico"></span>
      <span class="plus">+1</span>
      <span class="sep"></span>
      <div class="txt"><span class="th">Trophée débloqué</span><span class="ts" id="csub">4 / 41 · <b>10 %</b></span></div>
    </div>
  </div>

<script>
const CONFIG={ demo:true, son:true, sens:"left" };   // sens: "left" (glisse depuis la gauche) ou "right"
const TROPHY=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4V3h10v1h4v3a4 4 0 0 1-4 4h-.3A5 5 0 0 1 13 13.9V16h3v2H8v-2h3v-2.1A5 5 0 0 1 7.3 11H7a4 4 0 0 1-4-4V4h4zm0 2H5v1a2 2 0 0 0 2 2V6zm10 0v3a2 2 0 0 0 2-2V6h-2z"/></svg>`;
document.querySelector('.ico').innerHTML=TROPHY;
document.querySelector('.card').style.setProperty('--dx', CONFIG.sens==='right'?'26px':'-26px');
let actx;
function ding(){ if(!CONFIG.son) return; try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); const now=actx.currentTime; [[880,0],[1320,0.1]].forEach(([f,dt])=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='triangle'; o.frequency.value=f; g.gain.setValueAtTime(0.0001,now+dt); g.gain.exponentialRampToValueAtTime(0.16,now+dt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dt+0.4); o.connect(g).connect(actx.destination); o.start(now+dt); o.stop(now+dt+0.45); }); }catch(e){} }
let _busy=0;
function celebrate(got,total){ if(Date.now()-_busy<1200) return; _busy=Date.now(); const pct=total?Math.round(got/total*100):0; document.getElementById('csub').innerHTML=got+' / '+total+' · <b>'+pct+' %</b>'; const n=document.getElementById('note'); n.classList.remove('show'); void n.offsetWidth; n.classList.add('show'); ding(); }
/* réception du signal (widget jeu) — dédoublonné par timestamp */
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
let _lastTs=0;
function onTrophy(p){ if(!p) return; if(p.ts){ if(p.ts<=_lastTs) return; _lastTs=p.ts; } celebrate(p.got,p.total); }
if(bcHud) bcHud.onmessage=function(ev){ if(ev.data&&ev.data.kind==='trophy') onTrophy(ev.data); };
try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) _lastTs=JSON.parse(r0).ts||0; }catch(e){}
setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r) onTrophy(JSON.parse(r)); }catch(e){} },300);
window.testCelebrate=(g=4,t=41)=>{ _busy=0; celebrate(g,t); };
if(CONFIG.demo){ setTimeout(()=>{ _busy=0; celebrate(4,41); }, 1200); }
</script>
</body>
</html>
