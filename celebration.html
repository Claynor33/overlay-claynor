<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Célébration trophée</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --tc:#cd7f32; --td:#8a4f1d; --tg:rgba(205,127,50,.45); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; }
  #note{ position:absolute; left:12px; top:12px; }

  .card{ --dx:-26px; position:relative; display:inline-flex; align-items:center; gap:13px; padding:11px 20px 11px 15px;
    background:linear-gradient(105deg, rgba(14,12,9,.96), rgba(9,8,6,.93));
    border:1px solid var(--tc);
    clip-path:polygon(0 0, calc(100% - 13px) 0, 100% 13px, 100% 100%, 13px 100%, 0 calc(100% - 13px));
    box-shadow:0 0 30px -12px var(--tc);
    opacity:0; transform:translateX(var(--dx)); }
  .card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--tc),var(--td)); box-shadow:0 0 12px var(--tc); }
  .card::after{ content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.28) 50%,transparent 58%); transform:translateX(-120%); }
  #note.show .card{ animation:cardIn .45s cubic-bezier(.2,1.25,.3,1) forwards, cardOut .5s ease var(--hold,3.4s) forwards; }
  #note.show .card::after{ animation:shine 1s ease .3s; }

  .ico{ width:30px; height:30px; display:inline-flex; filter:drop-shadow(0 0 8px var(--tc)); }
  .ico svg{ width:100%; height:100%; }
  .ico .lt{ fill:var(--tc); stroke:var(--tc); } .ico .dk{ fill:var(--td); }
  .plus{ font-family:'Chakra Petch'; font-weight:700; font-size:30px; line-height:1; color:var(--tc); text-shadow:0 0 16px var(--tc); white-space:nowrap; }
  #note.show .plus{ animation:plusPop .55s cubic-bezier(.2,1.5,.3,1) .1s both; }
  .sep{ width:1px; height:34px; background:linear-gradient(transparent,var(--tc),transparent); opacity:.55; }
  .txt{ display:flex; flex-direction:column; gap:3px; }
  .th{ font-family:'Chakra Petch'; font-weight:700; font-size:13px; letter-spacing:.16em; color:var(--tc); text-transform:uppercase; text-shadow:0 0 12px var(--tc); white-space:nowrap; }
  .ts{ font-family:'Rajdhani'; font-weight:600; font-size:13px; letter-spacing:.14em; color:#cfc9bd; text-transform:uppercase; white-space:nowrap; }
  .ts b{ color:var(--tc); }

  /* ---- intensité par palier ---- */
  #note.palier .card{ box-shadow:0 0 44px -10px var(--tc); }
  #note.palier .th{ font-size:14px; }
  #note.palier .card{ animation:cardIn .45s cubic-bezier(.2,1.25,.3,1) forwards, palierPulse 1.1s ease .45s 2, cardOut .5s ease var(--hold,4.4s) forwards; }
  /* diamant : halo froid + facettes */
  #note.diamant .card{ box-shadow:0 0 52px -8px var(--tc), inset 0 0 30px -18px var(--tc); }
  #note.diamant .ico{ filter:drop-shadow(0 0 14px var(--tc)); }
  /* platine : plus grand, iridescent, plus long */
  #note.platine .card{ padding:15px 26px 15px 19px; gap:16px; box-shadow:0 0 68px -6px var(--tc), inset 0 0 36px -16px var(--tc);
    animation:cardIn .5s cubic-bezier(.2,1.3,.3,1) forwards, platPulse 1.5s ease .5s 3, cardOut .6s ease var(--hold,6s) forwards; }
  #note.platine .card::after{ background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.5) 46%,rgba(190,235,255,.4) 52%,transparent 62%); }
  #note.platine .ico{ width:40px; height:40px; }
  #note.platine .plus{ font-size:34px; }
  #note.platine .th{ font-size:19px; letter-spacing:.2em; }
  #note.platine .ts{ font-size:14px; }

  .spark{ position:absolute; width:8px; height:8px; background:var(--tc); box-shadow:0 0 10px var(--tc); pointer-events:none; border-radius:2px; }
  .spark.facet{ width:9px; height:9px; border-radius:0; transform:rotate(45deg); }

  @keyframes cardIn{ to{ opacity:1; transform:translateX(0); } }
  @keyframes cardOut{ to{ opacity:0; transform:translateX(var(--dx)); } }
  @keyframes plusPop{ 0%{ transform:scale(.3); opacity:0; } 60%{ transform:scale(1.25); opacity:1; } 100%{ transform:scale(1); } }
  @keyframes shine{ to{ transform:translateX(120%); } }
  @keyframes palierPulse{ 0%,100%{ box-shadow:0 0 44px -10px var(--tc); } 50%{ box-shadow:0 0 62px -4px var(--tc); } }
  @keyframes platPulse{ 0%,100%{ box-shadow:0 0 68px -6px var(--tc), inset 0 0 36px -16px var(--tc); } 50%{ box-shadow:0 0 96px 2px var(--tc), inset 0 0 44px -10px var(--tc); } }
  @media (prefers-reduced-motion: reduce){ #note.show .plus,#note.show .card::after{ animation:none; } }
</style>
</head>
<body>
  <div id="note">
    <div class="card">
      <span class="ico"></span>
      <span class="plus" id="plus">+1</span>
      <span class="sep"></span>
      <div class="txt"><span class="th" id="ctitle">Trophée débloqué</span><span class="ts" id="csub">4 / 41 · <b>10 %</b></span></div>
    </div>
  </div>

<script>
/* ================== PALIERS (identiques au widget Jeu & trophées) ================== */
const TIERS=[
  { id:"bronze",  nom:"Bronze",  max:25,  c:"#cd7f32", d:"#7d4a1c", glow:"rgba(205,127,50,.45)" },
  { id:"argent",  nom:"Argent",  max:50,  c:"#c9d4de", d:"#7d8a97", glow:"rgba(201,212,222,.45)" },
  { id:"or",      nom:"Or",      max:75,  c:"#f5c542", d:"#c8951f", glow:"rgba(245,197,66,.45)" },
  { id:"diamant", nom:"Diamant", max:100, c:"#b9f2ff", d:"#4fa9c4", glow:"rgba(185,242,255,.5)"  },
  { id:"platine", nom:"Platine", max:101, c:"#e8f4ff", d:"#9fb4c6", glow:"rgba(232,244,255,.55)" }
];
function tierFor(pct, complet){ if(complet) return TIERS[4]; for(const t of TIERS){ if(pct < t.max) return t; } return TIERS[3]; }

const CONFIG={
  demo:false,                 // mets false pour OBS
  son:true,
  sens:"left",               // "left" ou "right" : bord d'où la carte sort
  seuils:[25,50,75]          // paliers célébrés (le 100 % = platine, toujours actif)
};
const TROPHY='<svg viewBox="0 0 24 24" fill="none"><path class="lt" d="M6 4h12v3a6 6 0 0 1-12 0V4Z"/><path class="lt" d="M18 4h3v2a3 3 0 0 1-3 3M6 4H3v2a3 3 0 0 0 3 3" stroke-width="1.6" stroke-linecap="round" fill="none"/><path class="dk" d="M10 13h4v3h-4z"/><path class="lt" d="M8 19h8v1.5H8z"/><path class="dk" d="M9.5 16.5h5V19h-5z"/></svg>';
const note=document.getElementById('note');
document.querySelector('.ico').innerHTML=TROPHY;
document.querySelector('.card').style.setProperty('--dx', CONFIG.sens==='right'?'26px':'-26px');

/* ---------------- sons : un timbre par palier ---------------- */
const SON={
  bronze : { type:'sine',     n:[[440,0],[554,.10]] },
  argent : { type:'triangle', n:[[587,0],[784,.10]] },
  or     : { type:'triangle', n:[[784,0],[1175,.11]] },
  diamant: { type:'sine',     n:[[988,0],[1319,.09],[1760,.18]] },
  platine: { type:'triangle', n:[[784,0],[988,.11],[1175,.22],[1568,.34],[2093,.46]] }
};
const SON_PALIER={
  argent : { type:'triangle', n:[[587,0],[740,.09],[880,.18]] },
  or     : { type:'triangle', n:[[784,0],[988,.09],[1175,.18],[1319,.28]] },
  diamant: { type:'sine',     n:[[988,0],[1175,.08],[1480,.16],[1976,.26],[2349,.36]] },
  platine: SON.platine
};
let actx;
function ding(spec){ if(!CONFIG.son||!spec) return; try{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume();
  const now=actx.currentTime;
  spec.n.forEach(([f,dt])=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type=spec.type; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,now+dt); g.gain.exponentialRampToValueAtTime(0.17,now+dt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dt+0.45);
    o.connect(g).connect(actx.destination); o.start(now+dt); o.stop(now+dt+0.5); });
}catch(e){} }

/* ---------------- étincelles ---------------- */
function sparks(n, facet, iris){
  const r=document.querySelector('.card').getBoundingClientRect();
  for(let i=0;i<n;i++){ const s=document.createElement('span'); s.className='spark'+(facet?' facet':'');
    if(iris){ const h=[ '#e8f4ff','#b9f2ff','#ffd9f2','#fff3c4' ][i%4]; s.style.background=h; s.style.boxShadow='0 0 10px '+h; }
    s.style.left=(r.left+r.width*0.5)+'px'; s.style.top=(r.top+r.height*0.5)+'px'; document.body.appendChild(s);
    const a=Math.random()*Math.PI*2, d=90+Math.random()*(iris?190:140);
    s.animate([{transform:'translate(-50%,-50%) scale(1) rotate('+(facet?45:0)+'deg)',opacity:1},
               {transform:'translate(calc(-50% + '+Math.cos(a)*d+'px), calc(-50% + '+Math.sin(a)*d+'px)) scale(0) rotate('+(facet?225:180)+'deg)',opacity:0}],
              {duration:850+Math.random()*650,easing:'cubic-bezier(.2,.7,.2,1)'});
    setTimeout(()=>s.remove(),1600); }
}

/* ---------------- affichage ---------------- */
let _busy=0;
function celebrate(got,total){
  if(Date.now()-_busy<1200) return; _busy=Date.now();
  const pct = total?Math.round(got/total*100):0;
  const exact = total?(got/total*100):0;
  const prev  = total?((got-1)/total*100):0;
  const complet = total>0 && got>=total;
  const franchi = CONFIG.seuils.filter(s=> prev < s && exact >= s).pop();
  const tier = tierFor(exact, complet);

  let mode='normal', titre='Trophée débloqué', plus='+1', hold='3.4s', son=SON[tier.id];
  if(complet){ mode='platine'; titre='Platine !'; plus='100%'; hold='6s'; son=SON_PALIER.platine; }
  else if(franchi){ mode='palier'; titre='Palier — '+tier.nom; hold='4.4s'; son=SON_PALIER[tier.id]||SON[tier.id]; }

  note.className=''; void note.offsetWidth;
  const rs=document.documentElement.style;
  rs.setProperty('--tc',tier.c); rs.setProperty('--td',tier.d); rs.setProperty('--tg',tier.glow);
  document.querySelector('.card').style.setProperty('--hold',hold);
  document.getElementById('plus').textContent=plus;
  document.getElementById('ctitle').textContent=titre;
  document.getElementById('csub').innerHTML=got+' / '+total+' · <b>'+pct+' %</b>';

  note.classList.add('show');
  if(mode==='platine'){ note.classList.add('platine'); sparks(26,true,true); }
  else if(mode==='palier'){ note.classList.add('palier'); if(tier.id==='diamant'){ note.classList.add('diamant'); sparks(18,true,false); } else sparks(12,false,false); }
  else if(tier.id==='diamant'){ note.classList.add('diamant'); }
  ding(son);
}

/* ---------------- réception du signal (widget Jeu & trophées) ---------------- */
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
let _lastTs=0;
function onTrophy(p){ if(!p) return; if(p.ts){ if(p.ts<=_lastTs) return; _lastTs=p.ts; } celebrate(p.got,p.total); }
if(bcHud) bcHud.onmessage=function(ev){ if(ev.data&&ev.data.kind==='trophy') onTrophy(ev.data); };
try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) _lastTs=JSON.parse(r0).ts||0; }catch(e){}
setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r) onTrophy(JSON.parse(r)); }catch(e){} },300);

window.testCelebrate=(g=4,t=41)=>{ _busy=0; celebrate(g,t); };
window.testPalier=(s=50,t=41)=>{ _busy=0; celebrate(Math.ceil(t*s/100),t); };
window.testPlatine=(t=41)=>{ _busy=0; celebrate(t,t); };
if(CONFIG.demo){
  const T=41;
  setTimeout(()=>{_busy=0;celebrate(4,T);},1200);                      // bronze
  setTimeout(()=>{_busy=0;celebrate(Math.ceil(T*0.25),T);},6000);      // palier argent
  setTimeout(()=>{_busy=0;celebrate(Math.ceil(T*0.50),T);},11000);     // palier or
  setTimeout(()=>{_busy=0;celebrate(Math.ceil(T*0.75),T);},16000);     // palier diamant
  setTimeout(()=>{_busy=0;celebrate(T,T);},21000);                     // platine
}
</script>
</body>
</html>
