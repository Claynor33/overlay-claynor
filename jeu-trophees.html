<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu & Trophées</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --glow:rgba(205,127,50,.45); --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  .bar{ position:absolute; left:0; top:0; width:360px; height:64px; display:flex; align-items:stretch; background:linear-gradient(105deg, rgba(11,17,21,.97), rgba(9,14,18,.93)); clip-path:polygon(0 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 16px)); overflow:hidden; }
  .bar::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--cyan),var(--cyan-deep)); box-shadow:0 0 12px var(--cyan); z-index:4; }
  .bar-game{ position:relative; flex:1; padding:9px 10px 9px 16px; display:flex; flex-direction:column; justify-content:center; gap:3px; z-index:2; min-width:0; }
  .eyebrow{ display:flex; align-items:center; gap:7px; font-family:'Chakra Petch'; font-weight:600; font-size:9px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase; }
  .eyebrow .live{ width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:blink 1.5s ease-in-out infinite; }
  .game-name{ font-family:'Chakra Petch'; font-weight:700; font-size:25px; line-height:.95; letter-spacing:.05em; color:var(--ink); text-transform:uppercase; text-shadow:0 0 16px rgba(45,226,230,.22); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar-div{ width:1px; align-self:stretch; margin:12px 0; background:linear-gradient(var(--line),transparent); z-index:2; }
  .bar-trophy{ position:relative; display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:3px; padding:0 16px 0 14px; z-index:2; }
  .trophy-main{ display:flex; align-items:center; gap:9px; }
  .trophy-ico{ width:26px; height:26px; filter:drop-shadow(0 0 7px var(--glow)); transition:filter .4s ease; }
  .trophy-ico .lt{ fill:var(--gold); stroke:var(--gold); } .trophy-ico .dk{ fill:var(--gold-deep); }
  .trophy-count{ display:flex; align-items:baseline; gap:3px; font-family:'Chakra Petch'; font-weight:700; }
  .trophy-count .got{ font-size:25px; color:var(--gold); line-height:1; text-shadow:0 0 14px var(--glow); transition:transform .25s ease, color .4s ease; }
  .trophy-count .got.pop{ animation:pop .55s cubic-bezier(.2,1.4,.3,1); }
  .trophy-count .slash{ font-size:16px; color:var(--ink-dim); } .trophy-count .tot{ font-size:16px; color:var(--ink-dim); }
  .trophy-pct{ font-family:'Rajdhani'; font-weight:700; font-size:12px; letter-spacing:.16em; color:var(--gold); text-shadow:0 0 10px var(--glow); transition:color .4s ease; }
  .bar-progress{ position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.06); z-index:3; }
  .bar-progress-fill{ position:absolute; left:0; top:0; bottom:0; width:0; background:linear-gradient(90deg,var(--gold-deep),var(--gold)); box-shadow:0 0 10px var(--glow); transition:width 1.1s cubic-bezier(.2,.8,.2,1), background .4s ease; }
  #ctrl{ left:0; top:74px; width:320px; }

  #ctrl{ position:absolute; z-index:80; display:flex; flex-direction:column; gap:8px; padding:12px 14px; background:rgba(6,11,14,.96); border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.6); opacity:0; pointer-events:none; transition:opacity .18s ease; }
  #ctrl.show{ opacity:1; pointer-events:auto; }
  #ctrl .title{ font-family:'Chakra Petch'; font-weight:700; font-size:10px; letter-spacing:.28em; color:var(--cyan); text-transform:uppercase; text-align:center; }
  #ctrl .row{ display:flex; align-items:center; gap:7px; }
  #ctrl .lbl{ width:66px; font-weight:700; font-size:11px; letter-spacing:.1em; color:var(--ink-dim); text-transform:uppercase; }
  #ctrl button{ min-width:30px; height:30px; padding:0 9px; cursor:pointer; font-family:'Chakra Petch'; font-weight:700; font-size:14px; color:var(--ink); background:rgba(45,226,230,.10); border:1px solid var(--line); border-radius:6px; }
  #ctrl button:hover{ background:var(--cyan); color:#04252a; }
  #ctrl button.gold{ background:rgba(245,197,66,.12); border-color:rgba(245,197,66,.4); } #ctrl button.gold:hover{ background:var(--gold); color:#3a2a00; }
  #ctrl button.on{ background:var(--cyan); color:#04252a; }
  #ctrl .val{ min-width:50px; text-align:center; font-family:'Chakra Petch'; font-weight:700; font-size:15px; color:var(--gold); }
  #ctrl .val.acc{ color:var(--cyan); }
  #ctrl input{ flex:1; height:30px; min-width:60px; padding:0 9px; font-family:'Rajdhani'; font-weight:600; font-size:13px; color:var(--ink); background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:6px; text-transform:uppercase; }
  #ctrl input:focus{ outline:none; border-color:var(--cyan); }
  #ctrl .hint{ font-size:9px; letter-spacing:.05em; color:var(--ink-dim); text-align:center; }


  /* --- nom de jeu : ajustement automatique --- */
  .game-name>span{ display:inline-block; will-change:transform; }
  .game-name.scroll>span{ animation:marq var(--md,9s) ease-in-out infinite; }
  @keyframes marq{ 0%,14%{transform:translateX(0)} 50%,64%{transform:translateX(var(--mx,0))} 100%{transform:translateX(0)} }
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
@keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.5);filter:drop-shadow(0 0 16px var(--gold));}100%{transform:scale(1);}}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.92) translateY(-8px);}}
@keyframes shine{to{transform:translateX(120%);}}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-game"><div class="eyebrow"><span class="live"></span>En cours</div><div class="game-name" id="gameName"><span>CRYSIS</span></div></div>
  <div class="bar-div"></div>
  <div class="bar-trophy"><div class="trophy-main">
    <svg class="trophy-ico" viewBox="0 0 24 24" fill="none"><path class="lt" d="M6 4h12v3a6 6 0 0 1-12 0V4Z"/><path class="lt" d="M18 4h3v2a3 3 0 0 1-3 3M6 4H3v2a3 3 0 0 0 3 3" stroke-width="1.6" stroke-linecap="round" fill="none"/><path class="dk" d="M10 13h4v3h-4z"/><path class="lt" d="M8 19h8v1.5H8z"/><path class="dk" d="M9.5 16.5h5V19h-5z"/></svg>
    <div class="trophy-count"><span class="got" id="tGot">0</span><span class="slash">/</span><span class="tot" id="tTot">41</span></div>
  </div><div class="trophy-pct" id="tPct">0 %</div></div>
  <div class="bar-progress"><div class="bar-progress-fill" id="tBar"></div></div>
</div>
<div id="ctrl">
  <div class="title">Jeu & trophées</div>
  <div class="row"><span class="lbl">Trophées</span><button data-a="tm">-</button><span class="val"><span id="cG">3</span>/<span id="cT">41</span></span><button class="gold" data-a="tp">+</button></div>
  <div class="row"><span class="lbl">Total</span><button data-a="om">-</button><span class="val" id="cT2">41</span><button data-a="op">+</button></div>
  <div class="row"><span class="lbl">Jeu</span><input id="cGame" type="text" placeholder="Nom du jeu"><button data-a="gk">OK</button></div>
  <div class="hint">+ = animation trophée · le jeu recharge ses trophées + sa couleur</div>
</div>
<script>

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=amt<0?0:255,t=Math.abs(amt);r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function applyTheme(a){document.documentElement.style.setProperty('--cyan',a);document.documentElement.style.setProperty('--cyan-deep',shade(a,-0.4));}
function accent(){return getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6';}

const SKEY='hud_shared_v1';
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
function readShared(){ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function writeShared(patch){ let s=readShared()||{}; Object.assign(s,patch); s.v=Date.now(); try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} try{ bcHud&&bcHud.postMessage({kind:'state',s}); }catch(e){} return s; }
function subscribeHud(h){ if(bcHud) bcHud.onmessage=function(ev){ var d=ev.data; if(!d) return; if(d.kind==='state'&&h.state) h.state(d.s); if(d.kind==='trophy'&&h.trophy) h.trophy(d); }; if(h.state){ var lv=0; var c=readShared(); if(c) lv=c.v||0; setInterval(function(){ var s=readShared(); if(s&&(s.v||0)>lv){ lv=s.v; h.state(s); } },400); } if(h.trophy){ var lt=0; try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) lt=JSON.parse(r0).ts||0; }catch(e){} setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r){ var p=JSON.parse(r); if(p.ts&&p.ts>lt){ lt=p.ts; h.trophy(p); } } }catch(e){} },300); } }
function tokenUrl(fb){ try{ return new URLSearchParams(location.search).get('token') || fb || ''; }catch(e){ return fb||''; } }

const CONFIG={
  jeu:{nom:"CRYSIS"}, trophees:{obtenus:3,total:41},
  /* "palier" = toute la DA suit bronze/argent/or/diamant/platine
     "jeu"    = toute la DA suit la couleur du jeu en cours (ancien comportement) */
  themeGlobal:"palier",
  themes:{"CRYSIS":"#2de2e6"}
};
const K="wJT_v1";
const PAL=["#2de2e6","#9d5cff","#ff8a3d","#3df08a","#ff4d8d","#3d8bff","#ff5d5d","#5ad1a0"];
function accentFor(n){ if(CONFIG.themes[n]) return CONFIG.themes[n]; let h=0; for(const c of (n||'').toUpperCase()) h=(h*31+c.charCodeAt(0))>>>0; return PAL[h%PAL.length]; }
let state=load()||{jeu:{...CONFIG.jeu},trophees:{...CONFIG.trophees}}, profils=loadP(), prev=null;
function load(){ try{const r=localStorage.getItem(K);return r?JSON.parse(r):null;}catch(e){return null;} }
function save(){ try{localStorage.setItem(K,JSON.stringify(state));}catch(e){} }
function loadP(){ try{const r=localStorage.getItem(K+'_p');return r?JSON.parse(r):{};}catch(e){return {};} }
function saveP(){ try{localStorage.setItem(K+'_p',JSON.stringify(profils));}catch(e){} }
function pop(el){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
function countUp(node,t,d){const s=performance.now();(function f(n){const p=Math.min((n-s)/d,1);node.textContent=Math.round((1-Math.pow(1-p,3))*t);if(p<1)requestAnimationFrame(f);})(performance.now());}
function publish(){ writeShared({ jeu:state.jeu.nom, accent:accentGlobal(), trophees:{obtenus:state.trophees.obtenus,total:state.trophees.total} }); try{ window.__pubRemoteState&&window.__pubRemoteState(); }catch(e){} }
function fireCelebrate(){ const p={got:state.trophees.obtenus,total:state.trophees.total,ts:Date.now()}; try{ bcHud&&bcHud.postMessage(Object.assign({kind:'trophy'},p)); }catch(e){} try{ localStorage.setItem('hud_celebrate',JSON.stringify(p)); }catch(e){} }

/* ===== PALIERS (identiques au widget Célébration) ===== */
const TIERS=[
  { id:"bronze",  nom:"Bronze",  max:25,  c:"#cd7f32", d:"#7d4a1c", glow:"rgba(205,127,50,.45)" },
  { id:"argent",  nom:"Argent",  max:50,  c:"#c9d4de", d:"#7d8a97", glow:"rgba(201,212,222,.45)" },
  { id:"or",      nom:"Or",      max:75,  c:"#f5c542", d:"#c8951f", glow:"rgba(245,197,66,.45)" },
  { id:"diamant", nom:"Diamant", max:100, c:"#b9f2ff", d:"#4fa9c4", glow:"rgba(185,242,255,.5)"  },
  { id:"platine", nom:"Platine", max:101, c:"#e8f4ff", d:"#9fb4c6", glow:"rgba(232,244,255,.55)" }
];
function tierFor(pct, complet){ if(complet) return TIERS[4]; for(const t of TIERS){ if(pct < t.max) return t; } return TIERS[3]; }
function accentGlobal(){
  if(CONFIG.themeGlobal==="palier"){
    const S=state.trophees, exact=S.total?(S.obtenus/S.total*100):0;
    return tierFor(exact, S.total>0 && S.obtenus>=S.total).c;
  }
  return accentFor(state.jeu.nom);
}
function applyTier(got,total){
  const exact = total?(got/total*100):0, t = tierFor(exact, total>0 && got>=total);
  const rs=document.documentElement.style;
  rs.setProperty('--gold',t.c); rs.setProperty('--gold-deep',t.d); rs.setProperty('--glow',t.glow);
  return t;
}

/* ===== nom de jeu trop long : réduction auto, puis défilement ===== */
const NOM_LONG={
  mode:"reduire",     // "reduire" (rétrécit) · "defiler" (fait défiler) · "couper" (…)
  tailleMin:15,       // taille de police minimale en px
  affichage:{}        // noms courts perso, ex: {"KINGDOM COME: DELIVERANCE":"Kingdom Come"}
};
function nomAffiche(n){ return NOM_LONG.affichage[n] || n; }
function fitNom(){
  const box=document.getElementById('gameName'); if(!box) return;
  const inner=box.firstElementChild; if(!inner) return;
  box.classList.remove('scroll'); inner.style.transform=''; box.style.fontSize='';
  if(NOM_LONG.mode==='couper') return;
  const base=parseFloat(getComputedStyle(box).fontSize)||24;
  let size=base, guard=0;
  while(inner.scrollWidth>box.clientWidth && size>NOM_LONG.tailleMin && guard++<40){ size-=1; box.style.fontSize=size+'px'; }
  if(inner.scrollWidth>box.clientWidth+1 && NOM_LONG.mode==='defiler'){
    const over=inner.scrollWidth-box.clientWidth+2;
    box.style.setProperty('--mx', (-over)+'px');
    box.style.setProperty('--md', Math.max(7, over/22+6).toFixed(1)+'s');
    box.classList.add('scroll');
  }
}
try{ if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>fitNom()); }catch(e){}
window.addEventListener('resize', fitNom);
function render(){
  document.getElementById('gameName').firstElementChild.textContent = nomAffiche(state.jeu.nom);
  requestAnimationFrame(fitNom);
  const g=state.trophees.obtenus,t=state.trophees.total,el=document.getElementById('tGot');
  document.getElementById('tTot').textContent=t;
  applyTier(g,t); applyTheme(accentGlobal());
  const pct=t?Math.round(g/t*100):0; document.getElementById('tPct').textContent=pct+' %';
  requestAnimationFrame(()=>document.getElementById('tBar').style.width=pct+'%');
  if(prev===null) countUp(el,g,900); else if(g>prev){ el.textContent=g; pop(el); fireCelebrate(); } else el.textContent=g; prev=g;
  document.getElementById('cG').textContent=g; document.getElementById('cT').textContent=t; document.getElementById('cT2').textContent=t;
}
function saveCur(){ profils[state.jeu.nom]={obtenus:state.trophees.obtenus,total:state.trophees.total}; saveP(); }
function commit(){ saveCur(); save(); render(); publish(); }
function changeGame(n){ n=(n||'').trim(); if(!n||n===state.jeu.nom) return; saveCur(); const p=profils[n]||{obtenus:0,total:CONFIG.trophees.total}; state.jeu.nom=n; state.trophees.obtenus=p.obtenus; state.trophees.total=p.total; profils[n]={...p}; saveP(); save(); prev=state.trophees.obtenus; render(); sync(); publish(); }
function sync(){ document.getElementById('cGame').value=state.jeu.nom; }
document.getElementById('ctrl').addEventListener('click',e=>{ const a=e.target.getAttribute('data-a'); if(!a) return; const S=state.trophees;
  if(a==='tp'){S.obtenus=Math.min(S.obtenus+1,S.total);commit();}
  if(a==='tm'){S.obtenus=Math.max(S.obtenus-1,0);commit();}
  if(a==='op'){S.total++;commit();}
  if(a==='om'){S.total=Math.max(S.total-1,S.obtenus);commit();}
  if(a==='gk'){changeGame(document.getElementById('cGame').value);}
});
document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT')return; const S=state.trophees;
  if(e.key==='+'||e.key==='ArrowUp'){S.obtenus=Math.min(S.obtenus+1,S.total);commit();}
  if(e.key==='-'||e.key==='ArrowDown'){S.obtenus=Math.max(S.obtenus-1,0);commit();} });

const ctrl=document.getElementById('ctrl'); let hideT;
function wake(){ if(!ctrl) return; ctrl.classList.add('show'); clearTimeout(hideT); hideT=setTimeout(()=>ctrl.classList.remove('show'),3500); }
document.addEventListener('mousemove', wake); document.addEventListener('click', wake);

render(); sync(); applyTheme(accentGlobal()); publish();


/* ===== TÉLÉCOMMANDE (téléphone) via relais MQTT public =====
   Le "room" doit être IDENTIQUE dans controle.html. Change-le pour un code à toi. */
const REMOTE={ actif:true, room:"claynor-hud-x7k2", broker:"wss://broker.hivemq.com:8884/mqtt" };
(function(){
  if(!REMOTE.actif) return;
  var sc=document.createElement('script'); sc.src='https://unpkg.com/mqtt/dist/mqtt.min.js';
  sc.onload=function(){ try{
    var TA='claynor/'+REMOTE.room+'/action', TS='claynor/'+REMOTE.room+'/state';
    var cli=mqtt.connect(REMOTE.broker,{reconnectPeriod:3000});
    window.__pubRemoteState=function(){ try{ cli.publish(TS, JSON.stringify({jeu:state.jeu.nom,got:state.trophees.obtenus,total:state.trophees.total}), {retain:true}); }catch(e){} };
    cli.on('connect',function(){ cli.subscribe(TA); window.__pubRemoteState(); });
    cli.on('message',function(t,payload){ var m; try{ m=JSON.parse(payload.toString()); }catch(e){ return; } var S=state.trophees;
      if(m.a==='tp'){ S.obtenus=Math.min(S.obtenus+1,S.total); commit(); }
      else if(m.a==='tm'){ S.obtenus=Math.max(S.obtenus-1,0); commit(); }
      else if(m.a==='op'){ S.total++; commit(); }
      else if(m.a==='om'){ S.total=Math.max(S.total-1,S.obtenus); commit(); }
      else if(m.a==='set'&&typeof m.n==='number'){ S.obtenus=Math.max(0,Math.min(m.n,S.total)); commit(); }
      else if(m.a==='game'&&m.g){ changeGame(m.g); }
    });
  }catch(e){ console.warn('remote',e); } };
  document.head.appendChild(sc);
})();

</script>
</body>
</html>
