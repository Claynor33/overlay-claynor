<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derniers soutiens</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --cyan:#2de2e6; --cyan-deep:#0fa3b1; --gold:#f5c542; --gold-deep:#c8951f; --ink:#eaf6f7; --ink-dim:#6f858c; --line:rgba(45,226,230,.28); --tc:#f5c542; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; color:var(--ink); }

  .alerts{ position:absolute; left:0; top:0; width:320px; }
  .alerts-head{ display:flex; align-items:center; gap:9px; margin:0 0 9px 3px; font-family:'Chakra Petch'; font-weight:600; font-size:10px; letter-spacing:.34em; color:var(--ink-dim); text-transform:uppercase; }
  .alerts-head .dot{ width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 9px var(--cyan); animation:blink 1.6s ease-in-out infinite; }
  .alert{ position:relative; display:flex; align-items:center; gap:11px; height:40px; padding:0 14px 0 16px; margin-bottom:7px; background:linear-gradient(90deg, rgba(13,22,27,.94) 0%, rgba(10,15,19,.68) 100%); clip-path:polygon(0 0, 100% 0, 100% 100%, 11px 100%, 0 calc(100% - 11px)); opacity:0; transform:translateX(-20px); animation:slideIn .5s cubic-bezier(.2,.7,.2,1) forwards; }
  .alert::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--cyan),var(--cyan-deep)); box-shadow:0 0 10px var(--cyan); }
  .alert .name{ font-family:'Chakra Petch'; font-weight:700; font-size:14px; letter-spacing:.1em; color:var(--ink); text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .alert .sep{ flex:1; height:1px; min-width:8px; background:linear-gradient(90deg,var(--line),transparent); }
  .alert .tag{ font-family:'Rajdhani'; font-weight:700; font-size:11px; letter-spacing:.16em; color:var(--cyan); text-transform:uppercase; white-space:nowrap; }
  .alert .tag b{ color:var(--gold); }
  .alert.placeholder{ opacity:.4; } .alert.placeholder::before{ background:var(--ink-dim); box-shadow:none; } .alert.placeholder .name,.alert.placeholder .tag{ color:var(--ink-dim); }

@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
@keyframes slideIn{to{opacity:1;transform:translateX(0);}}
@keyframes pop{0%{transform:scale(1);}35%{transform:scale(1.5);filter:drop-shadow(0 0 16px var(--gold));}100%{transform:scale(1);}}
@keyframes toastIn{to{opacity:1;transform:translateX(-50%) scale(1);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) scale(.92) translateY(-8px);}}
@keyframes shine{to{transform:translateX(120%);}}
</style>
</head>
<body>
<div class="alerts"><div class="alerts-head"><span class="dot"></span>Derniers soutiens</div><div id="list"></div></div>
<script>

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=amt<0?0:255,t=Math.abs(amt);r=Math.round((f-r)*t+r);g=Math.round((f-g)*t+g);b=Math.round((f-b)*t+b);return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function applyTheme(a){document.documentElement.style.setProperty('--cyan',a);document.documentElement.style.setProperty('--cyan-deep',shade(a,-0.4));}
function accent(){return getComputedStyle(document.documentElement).getPropertyValue('--cyan').trim()||'#2de2e6';}
const ICON={
  follow:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10-9.3C.6 8.9 2 5.5 5.2 5.5c1.9 0 3.1 1 3.8 2 .7-1 1.9-2 3.8-2 3.2 0 4.6 3.4 3.2 6.2C19.5 16.3 12 21 12 21z"/></svg>`,
  sub:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 18l-6 3.4 1.4-6.8L2.3 9.1l6.9-.8L12 2z"/></svg>`,
  gift:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 7h-2.2A2.5 2.5 0 0 0 12 3.2 2.5 2.5 0 0 0 6.2 7H4a1 1 0 0 0-1 1v3h9V7h.9V6H12a1 1 0 1 1 1-1zm-8.5-1H9.9A1.5 1.5 0 1 1 11.5 6zm2.6 5H21V8a1 1 0 0 0-1-1v4zM4 12v8a1 1 0 0 0 1 1h6v-9H4zm9 9h6a1 1 0 0 0 1-1v-8h-7v9z"/></svg>`,
  don:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm.9 15.3v1.2h-1.6v-1.2c-1.4-.2-2.5-1-2.6-2.4h1.6c.1.7.7 1.1 1.8 1.1 1 0 1.6-.4 1.6-1s-.5-.9-1.8-1.2c-1.7-.4-2.9-1-2.9-2.5 0-1.2.9-2 2.3-2.2V5.5h1.6v1.3c1.3.2 2.2 1 2.3 2.2h-1.6c-.1-.6-.6-1-1.5-1s-1.4.4-1.4.9c0 .6.6.8 1.9 1.1 1.8.4 2.8 1.1 2.8 2.6 0 1.2-.9 2.1-2.4 2.4z"/></svg>`,
  raid:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm7 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM3 19v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1H3zm12 0v-1a6.5 6.5 0 0 0-1.2-3.8A4 4 0 0 1 21 18v1h-6z"/></svg>`,
  bits:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12l4 6-10 14L2 8l4-6zm.5 2L4 8h4l2-4H6.5zm7 0l2 4H20l-2.5-4H13.5zM10 4L8 8h8l-2-4h-4zM8.4 10L12 18l3.6-8H8.4z"/></svg>`
};
function connectStreamlabs(token,onEvent){ if(!token) return; const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js'; s.onload=()=>{ try{ const sl=io('https://sockets.streamlabs.com?token='+token,{transports:['websocket']}); sl.on('event',ev=>{ if(!ev||!ev.type) return; const ms=Array.isArray(ev.message)?ev.message:[ev.message]; ms.forEach(m=>{ if(m) onEvent(ev.type,m); }); }); }catch(e){ console.warn(e); } }; s.onerror=()=>console.warn('socket.io non chargé'); document.head.appendChild(s); }

const SKEY='hud_shared_v1';
let bcHud=null; try{ bcHud=new BroadcastChannel('hud-claynor'); }catch(e){}
function readShared(){ try{ const r=localStorage.getItem(SKEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function writeShared(patch){ let s=readShared()||{}; Object.assign(s,patch); s.v=Date.now(); try{ localStorage.setItem(SKEY,JSON.stringify(s)); }catch(e){} try{ bcHud&&bcHud.postMessage({kind:'state',s}); }catch(e){} return s; }
function subscribeHud(h){ if(bcHud) bcHud.onmessage=function(ev){ var d=ev.data; if(!d) return; if(d.kind==='state'&&h.state) h.state(d.s); if(d.kind==='trophy'&&h.trophy) h.trophy(d); }; if(h.state){ var lv=0; var c=readShared(); if(c) lv=c.v||0; setInterval(function(){ var s=readShared(); if(s&&(s.v||0)>lv){ lv=s.v; h.state(s); } },400); } if(h.trophy){ var lt=0; try{ var r0=localStorage.getItem('hud_celebrate'); if(r0) lt=JSON.parse(r0).ts||0; }catch(e){} setInterval(function(){ try{ var r=localStorage.getItem('hud_celebrate'); if(r){ var p=JSON.parse(r); if(p.ts&&p.ts>lt){ lt=p.ts; h.trophy(p); } } }catch(e){} },300); } }
function tokenUrl(fb){ try{ return new URLSearchParams(location.search).get('token') || fb || ''; }catch(e){ return fb||''; } }

const CONFIG={
  demo:false, accent:"#2de2e6", max:3,
  expiration:12,        // heures avant qu'un soutien disparaisse (0 = jamais)
  streamlabs:{token:""}
};
const K="wSou_v2";   // v2 = repart sans les anciennes données de test
const LABELS={resub:"Resub",gift:"Sub offert",sub:"Sub",follow:"Follow",don:"Don",raid:"Raid",host:"Host",bits:"Bits"};
let feed=loadF();
function loadF(){ try{const r=localStorage.getItem(K); const a=r?JSON.parse(r):[]; return purge(Array.isArray(a)?a:[]); }catch(e){return [];} }
function purge(a){ if(!CONFIG.expiration) return a; const lim=Date.now()-CONFIG.expiration*3600*1000; return a.filter(s=> (s.t||0) > lim); }
function saveF(){ try{localStorage.setItem(K,JSON.stringify(feed));}catch(e){} }
function tag(t,n){ const l=LABELS[t]||t; if(t==='don') return n?l+' '+esc(n):l; if(t==='raid'||t==='host'||t==='bits') return n?l+' <b>'+n+'</b>':l; return n&&n>1?l+' <b>×'+n+'</b>':l; }
function push(nom,tg){ feed.unshift({nom,tag:tg,t:Date.now()}); feed=feed.slice(0,CONFIG.max); saveF(); render(); }
function render(){ const c=document.getElementById('list'); c.innerHTML=''; if(!feed.length){ const e=document.createElement('div'); e.className='alert placeholder'; e.innerHTML='<span class="name">En attente…</span><span class="sep"></span><span class="tag">—</span>'; c.appendChild(e); return; } feed.forEach((s,i)=>{ const e=document.createElement('div'); e.className='alert'; e.style.animationDelay=(i*0.08)+'s'; e.innerHTML='<span class="name">'+esc(s.nom)+'</span><span class="sep"></span><span class="tag">'+s.tag+'</span>'; c.appendChild(e); }); }
function onEvent(type,m){ const name=(m.name||m.from||m.gifter||'ANON');
  if(type==='follow') push(name,tag('follow'));
  else if(type==='donation') push(name,tag('don',m.formatted_amount||m.amount));
  else if(type==='raid'||type==='host') push(name,tag(type,m.raiders||m.viewers||0));
  else if(type==='bits') push(name,tag('bits',parseInt(m.amount,10)||0));
  else if(type==='subscription'||type==='resub'){ const st=(m.sub_type||'').toLowerCase();
    if(st==='subgift'||st==='anonsubgift') push(m.gifter||name,tag('gift',1));
    else if(st==='submysterygift') push(m.gifter||name,tag('gift',m.amount||1));
    else if(st==='resub'||(m.months&&m.months>1)) push(name,tag('resub',m.months||1));
    else push(name,tag('sub',1)); } }
setInterval(()=>{ const n=purge(feed); if(n.length!==feed.length){ feed=n; saveF(); render(); } }, 60000);
window.addSoutien=(n,t="sub",x=1)=>push(n,tag(t,x));
window.clearSoutiens=()=>{ feed=[]; saveF(); render(); };
var _s=readShared(); applyTheme((_s&&_s.accent)||CONFIG.accent);
subscribeHud({ state:function(s){ if(s.accent) applyTheme(s.accent); } });
connectStreamlabs(tokenUrl(CONFIG.streamlabs.token), onEvent);
if(CONFIG.demo && !feed.length){ feed=[{nom:"RAZBOTT",tag:tag('resub',3)},{nom:"0DLANOR",tag:tag('resub',3)},{nom:"AVENPARKX",tag:tag('gift',1)}]; }
render();

</script>
<div id="ctrl" style="position:absolute;left:0;top:150px;z-index:80;display:flex;gap:7px;align-items:center;padding:10px 12px;background:rgba(6,11,14,.96);border:1px solid var(--line);border-radius:9px;opacity:0;pointer-events:none;transition:opacity .18s ease">
  <span style="font-family:'Chakra Petch';font-weight:700;font-size:10px;letter-spacing:.22em;color:var(--cyan);text-transform:uppercase">Soutiens</span>
  <button id="vider" style="height:30px;padding:0 12px;cursor:pointer;font-family:'Chakra Petch';font-weight:700;font-size:12px;color:var(--ink);background:rgba(45,226,230,.10);border:1px solid var(--line);border-radius:6px">Vider</button>
</div>
<script>
(function(){ const c=document.getElementById('ctrl'); let t;
  function wake(){ c.style.opacity='1'; c.style.pointerEvents='auto'; clearTimeout(t); t=setTimeout(()=>{c.style.opacity='0';c.style.pointerEvents='none';},3500); }
  document.addEventListener('mousemove',wake); document.addEventListener('click',wake);
  document.getElementById('vider').addEventListener('click',()=>window.clearSoutiens&&window.clearSoutiens());
})();
</script>
</body>
</html>
