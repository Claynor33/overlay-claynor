<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --tc:#cd7f32; --td:#7d4a1c; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:transparent; font-family:'Rajdhani',sans-serif; }
  #note{ position:absolute; left:50%; top:16px; transform:translateX(-50%); }

  .card{ position:relative; display:inline-flex; align-items:center; gap:15px; padding:13px 26px 13px 19px;
    background:linear-gradient(105deg, rgba(13,12,10,.96), rgba(9,8,7,.93));
    border:1px solid var(--tc);
    clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%);
    box-shadow:0 0 36px -12px var(--tc);
    opacity:0; transform:scale(.86); }
  .card::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(var(--tc),var(--td)); box-shadow:0 0 12px var(--tc); }
  .card::after{ content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.26) 50%,transparent 58%); transform:translateX(-120%); }
  #note.show .card{ animation:inA .48s cubic-bezier(.2,1.35,.3,1) forwards, outA .5s ease var(--hold,3.4s) forwards; }
  #note.show .card::after{ animation:shine 1s ease .3s; }

  .ico{ width:34px; height:34px; display:inline-flex; filter:drop-shadow(0 0 9px var(--tc)); }
  .ico svg{ width:100%; height:100%; }
  .ico .lt{ fill:var(--tc); } .ico .dk{ fill:var(--td); } .ico .st{ stroke:var(--tc); fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  #note.show .ico{ animation:icoPop .55s cubic-bezier(.2,1.5,.3,1) .08s both; }
  .sep{ width:1px; height:36px; background:linear-gradient(transparent,var(--tc),transparent); opacity:.55; }
  .txt{ display:flex; flex-direction:column; gap:3px; }
  .th{ font-family:'Chakra Petch'; font-weight:700; font-size:19px; letter-spacing:.13em; color:var(--tc); text-transform:uppercase; text-shadow:0 0 16px var(--tc); white-space:nowrap; }
  .ts{ font-family:'Rajdhani'; font-weight:600; font-size:14px; letter-spacing:.16em; color:#d5d0c6; text-transform:uppercase; white-space:nowrap; }

  /* intensité croissante */
  #note.n2 .card{ box-shadow:0 0 44px -11px var(--tc); }
  #note.n3 .card{ box-shadow:0 0 52px -10px var(--tc); animation:inA .48s cubic-bezier(.2,1.35,.3,1) forwards, pulseA 1.2s ease .5s 2, outA .5s ease var(--hold,3.8s) forwards; }
  #note.n4 .card{ box-shadow:0 0 60px -8px var(--tc), inset 0 0 30px -18px var(--tc); animation:inA .48s cubic-bezier(.2,1.35,.3,1) forwards, pulseA 1.2s ease .5s 2, outA .5s ease var(--hold,4.2s) forwards; }
  #note.n5 .card{ padding:17px 32px 17px 22px; gap:18px; box-shadow:0 0 74px -6px var(--tc), inset 0 0 36px -16px var(--tc);
    animation:inA .52s cubic-bezier(.2,1.35,.3,1) forwards, pulseA 1.4s ease .5s 3, outA .55s ease var(--hold,5s) forwards; }
  #note.n5 .card::after{ background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.5) 46%,rgba(190,235,255,.4) 52%,transparent 62%); }
  #note.n5 .ico{ width:42px; height:42px; } #note.n5 .th{ font-size:23px; } #note.n5 .ts{ font-size:15px; }

  .spark{ position:absolute; width:8px; height:8px; background:var(--tc); box-shadow:0 0 10px var(--tc); border-radius:2px; pointer-events:none; }
  .spark.facet{ border-radius:0; transform:rotate(45deg); }

  @keyframes inA{ to{ opacity:1; transform:scale(1);} }
  @keyframes outA{ to{ opacity:0; transform:scale(.94) translateY(-8px);} }
  @keyframes icoPop{ 0%{transform:scale(.4);opacity:0} 60%{transform:scale(1.22);opacity:1} 100%{transform:scale(1)} }
  @keyframes shine{ to{ transform:translateX(120%);} }
  @keyframes pulseA{ 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.35)} }
  @media (prefers-reduced-motion: reduce){ #note.show .ico,#note.show .card::after{ animation:none; } }
</style>
</head>
<body>
  <div id="note">
    <div class="card">
      <span class="ico" id="ico"></span>
      <span class="sep"></span>
      <div class="txt"><span class="th" id="th">—</span><span class="ts" id="ts">—</span></div>
    </div>
  </div>

<script>
/* ============ PALIERS (même palette que les trophées) ============ */
const TIERS={
  bronze : { c:"#cd7f32", d:"#7d4a1c", n:1 },
  argent : { c:"#c9d4de", d:"#7d8a97", n:2 },
  or     : { c:"#f5c542", d:"#c8951f", n:3 },
  diamant: { c:"#b9f2ff", d:"#4fa9c4", n:4 },
  platine: { c:"#e8f4ff", d:"#9fb4c6", n:5 },
  raid   : { c:"#ff8a3d", d:"#a8501a", n:4 },   // à part
  bits   : { c:"#a970ff", d:"#5c30a8", n:4 }    // à part
};

/* ============ ICÔNES (famille "récompense") ============ */
const ICON={
  /* follow : médaille à ruban */
  follow:'<svg viewBox="0 0 24 24"><path class="lt" d="M7.7 2h2.9L8.3 7 5.4 2h2.3zm5.7 0h2.9L13.4 7 10.5 2h2.9z"/><path class="lt" d="M12 7.6a6.7 6.7 0 1 0 0 13.4 6.7 6.7 0 0 0 0-13.4zm0 2.7 1.2 2.45 2.7.4-1.95 1.9.46 2.7L12 16.5l-2.41 1.25.46-2.7-1.95-1.9 2.7-.4L12 10.3z"/></svg>',
  /* don : coffre au trésor */
  don:'<svg viewBox="0 0 24 24"><path class="lt" d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5V9h-6.6V7.4h-2.8V9H4V5.5z"/><path class="dk" d="M10.6 7.4h2.8V13h-2.8z"/><path class="lt" d="M4 10.6h6.6v1.7h2.8v-1.7H20V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8.4z"/></svg>',
  /* resub : trophée sur socle à étages */
  resub:'<svg viewBox="0 0 24 24"><path class="lt" d="M7 3h10v3.6a5 5 0 0 1-10 0V3z"/><path class="st" d="M17 4h3v1.6a2.8 2.8 0 0 1-2.8 2.8M7 4H4v1.6a2.8 2.8 0 0 0 2.8 2.8"/><path class="dk" d="M10.6 11.6h2.8v2.6h-2.8z"/><path class="lt" d="M8.6 14.6h6.8v1.9H8.6zM6.6 17.4h10.8V19H6.6zM5 20h14v1.6H5z"/></svg>',
  /* sub : trophée classique */
  sub:'<svg viewBox="0 0 24 24"><path class="lt" d="M6 4h12v3a6 6 0 0 1-12 0V4z"/><path class="st" d="M18 4h3v2a3 3 0 0 1-3 3M6 4H3v2a3 3 0 0 0 3 3"/><path class="dk" d="M10 13h4v3h-4z"/><path class="lt" d="M9.5 16.5h5V19h-5zM8 19.4h8V21H8z"/></svg>',
  /* sub offert : trophée qui sort d'un coffret */
  gift:'<svg viewBox="0 0 24 24"><path class="lt" d="M8.5 2h7v2.2a3.5 3.5 0 0 1-7 0V2z"/><path class="st" d="M15.5 2.6h2.2v1.2a2 2 0 0 1-2 2M8.5 2.6H6.3v1.2a2 2 0 0 0 2 2"/><path class="dk" d="M11 8h2v2h-2z"/><path class="lt" d="M3.6 11.4h16.8v3.1H3.6zM5.2 15.6h13.6V20a1.6 1.6 0 0 1-1.6 1.6H6.8A1.6 1.6 0 0 1 5.2 20v-4.4z"/><path class="dk" d="M11 11.4h2v10.2h-2z"/></svg>',
  /* raid : bannière de conquête */
  raid:'<svg viewBox="0 0 24 24"><path class="lt" d="M5 2h1.9v20H5z"/><path class="lt" d="M8.2 3.1h11.6l-2.6 4.1 2.6 4.1H8.2z"/><path class="dk" d="M13.2 5.1l.7 1.4 1.5.22-1.1 1.06.26 1.5-1.36-.71-1.36.71.26-1.5-1.1-1.06 1.5-.22z"/></svg>',
  /* bits : gemme taillée */
  bits:'<svg viewBox="0 0 24 24"><path class="lt" d="M7.4 2.6h9.2l4 5.6L12 21.6 3.4 8.2z"/><path class="dk" d="M12 2.6 9.1 8.2h5.8L12 2.6zM3.4 8.2h5.7L12 21.6 3.4 8.2zm11.5 0h5.7L12 21.6l2.9-13.4z"/></svg>'
};

/* ============ NIVEAUX DES ÉVÉNEMENTS ============ */
/* follow = plus bas · sub offert = plus haut · raid & bits à part */
const NIVEAU={
  follow : { tier:"bronze",  titre:"Nouveau follow" },
  don    : { tier:"argent",  titre:"Don" },
  resub  : { tier:"or",      titre:"Resub" },
  sub    : { tier:"diamant", titre:"Nouveau sub" },
  gift   : { tier:"platine", titre:"Sub offert" },
  raid   : { tier:"raid",    titre:"Raid !" },
  bits   : { tier:"bits",    titre:"Bits" }
};

const CONFIG={
  demo:false,                     // mets false pour OBS
  son:true,
  streamlabs:{ token:"" },
  actifs:{ follow:true, sub:true, raid:true, bits:true, don:true }
};

/* ============ SONS : timbre par niveau ============ */
const SON={
  follow :{ type:'sine',     n:[[440,0],[554,.10]] },
  don    :{ type:'triangle', n:[[587,0],[784,.10]] },
  resub  :{ type:'triangle', n:[[784,0],[988,.09],[1175,.18]] },
  sub    :{ type:'sine',     n:[[988,0],[1319,.09],[1760,.18]] },
  gift   :{ type:'triangle', n:[[784,0],[988,.11],[1175,.22],[1568,.34],[2093,.46]] },
  raid   :{ type:'triangle', n:[[392,0],[523,.08],[659,.16],[880,.24],[1047,.32]] },
  bits   :{ type:'sine',     n:[[1319,0],[1760,.07],[1319,.14],[2093,.21]] }
};
let actx;
function ding(k){ if(!CONFIG.son||!SON[k]) return; try{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume();
  const now=actx.currentTime, s=SON[k];
  s.n.forEach(([f,dt])=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type=s.type; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,now+dt); g.gain.exponentialRampToValueAtTime(0.17,now+dt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now+dt+0.45);
    o.connect(g).connect(actx.destination); o.start(now+dt); o.stop(now+dt+0.5); });
}catch(e){} }

function sparks(n, facet, iris){
  const r=document.querySelector('.card').getBoundingClientRect();
  for(let i=0;i<n;i++){ const s=document.createElement('span'); s.className='spark'+(facet?' facet':'');
    if(iris){ const h=['#e8f4ff','#b9f2ff','#ffd9f2','#fff3c4'][i%4]; s.style.background=h; s.style.boxShadow='0 0 10px '+h; }
    s.style.left=(r.left+r.width*0.5)+'px'; s.style.top=(r.top+r.height*0.5)+'px'; document.body.appendChild(s);
    const a=Math.random()*Math.PI*2, d=100+Math.random()*(iris?200:150);
    s.animate([{transform:'translate(-50%,-50%) scale(1) rotate('+(facet?45:0)+'deg)',opacity:1},
               {transform:'translate(calc(-50% + '+Math.cos(a)*d+'px), calc(-50% + '+Math.sin(a)*d+'px)) scale(0) rotate('+(facet?225:180)+'deg)',opacity:0}],
              {duration:850+Math.random()*650,easing:'cubic-bezier(.2,.7,.2,1)'});
    setTimeout(()=>s.remove(),1600); }
}

/* ============ file d'attente ============ */
const note=document.getElementById('note');
let q=[], busy=false;
function queue(a){ if(q.length>6) return; q.push(a); pump(); }
function pump(){ if(busy||!q.length) return; busy=true; const a=q.shift(); show(a); setTimeout(()=>{busy=false;pump();}, a.dur||4400); }
function show(a){
  const lvl=NIVEAU[a.kind], t=TIERS[lvl.tier];
  note.className=''; void note.offsetWidth;
  const rs=document.documentElement.style; rs.setProperty('--tc',t.c); rs.setProperty('--td',t.d);
  document.getElementById('ico').innerHTML=ICON[a.kind]||ICON.sub;
  document.getElementById('th').textContent=a.titre||lvl.titre;
  document.getElementById('ts').textContent=a.sub||'';
  note.classList.add('show','n'+t.n);
  if(t.n>=5) sparks(24,true,true);
  else if(t.n===4) sparks(16,true,false);
  else if(t.n===3) sparks(10,false,false);
  ding(a.kind);
}

/* ============ Streamlabs ============ */
function connectStreamlabs(token){ if(!token) return;
  const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.3/socket.io.js';
  s.onload=()=>{ try{ const sl=io('https://sockets.streamlabs.com?token='+token,{transports:['websocket']});
    sl.on('event',ev=>{ if(!ev||!ev.type) return; const ms=Array.isArray(ev.message)?ev.message:[ev.message]; ms.forEach(m=>{ if(m) onEvent(ev.type,m); }); });
  }catch(e){} }; document.head.appendChild(s); }
function onEvent(type,m){
  const name=(m.name||m.from||m.gifter||'ANON');
  if(type==='follow'){ if(CONFIG.actifs.follow) queue({kind:'follow', sub:name, dur:4200}); }
  else if(type==='donation'){ if(CONFIG.actifs.don){ const a=m.formatted_amount||m.amount; queue({kind:'don', sub:name+(a?' · '+a:''), dur:4400}); } }
  else if(type==='raid'||type==='host'){ if(CONFIG.actifs.raid) queue({kind:'raid', titre:(type==='raid'?'Raid !':'Host'), sub:name+' · '+(m.raiders||m.viewers||0)+' viewers', dur:4800}); }
  else if(type==='bits'){ if(CONFIG.actifs.bits) queue({kind:'bits', sub:name+' · '+(parseInt(m.amount,10)||0)+' bits', dur:4800}); }
  else if(type==='subscription'||type==='resub'){ if(!CONFIG.actifs.sub) return;
    const st=(m.sub_type||'').toLowerCase();
    if(st==='subgift'||st==='anonsubgift') queue({kind:'gift', sub:(m.gifter||name), dur:5600});
    else if(st==='submysterygift') queue({kind:'gift', titre:'Subs offerts', sub:(m.gifter||name)+' · ×'+(m.amount||1), dur:5600});
    else if(st==='resub'||(m.months&&m.months>1)) queue({kind:'resub', sub:name+' · '+(m.months||1)+' mois', dur:4600});
    else queue({kind:'sub', sub:name, dur:4800});
  }
}
connectStreamlabs((new URLSearchParams(location.search).get('token'))||CONFIG.streamlabs.token);

window.testFollow=(n='NEOxWOLF')=>onEvent('follow',{name:n});
window.testDon=(n='LUNA',a='5€')=>onEvent('donation',{name:n,formatted_amount:a,amount:5});
window.testResub=(n='DARKMES',m=8)=>onEvent('resub',{name:n,sub_type:'resub',months:m});
window.testSub=(n='KALYA_TV')=>onEvent('subscription',{name:n,sub_type:'sub'});
window.testGift=(n='RAZBOTT',a=5)=>onEvent('subscription',{gifter:n,sub_type:'submysterygift',amount:a});
window.testRaid=(n='POKIMANE',c=138)=>onEvent('raid',{name:n,raiders:c});
window.testBits=(n='XQCOW',a=500)=>onEvent('bits',{name:n,amount:String(a)});
if(CONFIG.demo){ setTimeout(testFollow,1000); setTimeout(testDon,5600); setTimeout(testResub,10200); setTimeout(testSub,14900); setTimeout(testGift,19700); setTimeout(testRaid,25500); setTimeout(testBits,30500); }
</script>
</body>
</html>
